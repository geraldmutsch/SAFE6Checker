      {title:'Engage local stakeholders',desc:'Schedule workshops with local IT, business, legal, and compliance teams. They know their market\'s unique requirements.'},
      {title:'Assess regulatory requirements',desc:'Document data privacy laws (GDPR, LGPD, etc.), industry regulations, and local compliance needs. Flag any that require solution changes.'},
      {title:'Map localization needs',desc:'Identify language translations, date/currency formats, local terminology, and cultural considerations that affect the user experience.'},
      {title:'Score readiness',desc:'Rate each category as Green (ready), Amber (needs work but manageable), or Red (blocking issue). Red items become rollout prerequisites.'},
      {title:'Create the action plan',desc:'For every Amber/Red item, define the action needed, owner, and deadline. Track in the Rollout Plan. CSA must be fully Green before go-live.'}
    ]
  },
  {id:'rollout-plan', name:'Rollout Plan', owner:'Rollout Lead', stages:['8'],
    why:'Detailed execution plan for rolling out the solution across markets, managing complexity and dependencies.',
    description:'The master execution plan for deploying the solution across all target markets/regions. It defines the rollout sequence (which markets first), timeline per market, dependencies between markets, resource allocation, and go-live criteria. For global enterprises, it coordinates across time zones, languages, and local teams. The plan balances speed (rolling out quickly for value) with safety (not overwhelming support capacity).',
    sections:['Rollout Sequence (market-by-market order with rationale)','Timeline per Market (CSA → Tech Enablement → UAT → Go-Live → Hypercare)','Resource Plan (who supports which market)','Dependency Map (cross-market and cross-team dependencies)','Go-Live Criteria per Market','Risk Register','Escalation Paths','Communication Schedule','Success Metrics'],
    format:'Gantt chart (MS Project, Smartsheet) + narrative document',
    tools:['Smartsheet','MS Project','Azure DevOps','Confluence','Excel'],
    howToBuild:[
      {title:'Determine rollout sequence',desc:'Prioritize markets by business impact, readiness (CSA scores), and complexity. Start with a pilot market, then expand. Group similar markets for efficiency.'},
      {title:'Build the timeline per market',desc:'Each market follows: CSA Complete → Tech Enablement (2-4 weeks) → Local UAT (1-2 weeks) → Go-Live → Hypercare (4-8 weeks). Adjust based on complexity.'},
      {title:'Allocate resources',desc:'Map which rollout team members support which markets. Ensure no one is assigned to overlapping go-lives unless capacity allows.'},
      {title:'Identify dependencies',desc:'Map which markets depend on shared infrastructure, shared configuration, or sequential data migrations. Sequence accordingly.'},
      {title:'Define go-live criteria per market',desc:'CSA all-green, tech enablement complete, local UAT passed, training delivered, support team briefed, change comms sent.'},
      {title:'Plan for contingency',desc:'Build 1-2 week buffer between markets. If one market\'s go-live slips, the next isn\'t immediately affected.'}
    ]
  },
  {id:'tech-enablement-checklist', name:'Tech Enablement Checklist', owner:'Rollout Lead', stages:['8'],
    why:'Ensures local technical infrastructure and configurations are ready before go-live.',
    description:'A detailed technical readiness checklist specific to each market/region being rolled out. It covers environment configuration, data migration, integration setup, security configuration, performance validation, and infrastructure provisioning. Completing this checklist confirms that the technical foundation is solid before business users begin UAT or go-live.',
    sections:['Environment Configuration (tenant setup, region config)','Data Migration (import, validation, reconciliation)','Integration Setup (local systems, SSO, APIs)','Security Configuration (roles, permissions, certificates)','Performance Validation (load test with local data volumes)','Monitoring Setup (alerts, dashboards, log aggregation)','Backup & Recovery Verification','Network & Connectivity Checks','Sign-off Section'],
    format:'Excel checklist or Confluence checklist page per market',
    tools:['Excel','Confluence','Azure DevOps (task tracking)','Infrastructure monitoring tools'],
    howToBuild:[
      {title:'Template from first rollout',desc:'Create the checklist during the pilot market rollout. Every step the team performs gets documented. This becomes the template for subsequent markets.'},
      {title:'Customize per market',desc:'Add market-specific items: local SSO provider, regional data center, specific integrations, language pack deployment.'},
      {title:'Assign owners per item',desc:'Each checklist item has a named owner and expected completion date. Track in daily rollout standup.'},
      {title:'Include verification steps',desc:'Each configuration step has a corresponding verification: "Configure SSO" → "Verify SSO login works for 3 test users."'},
      {title:'Require sign-off',desc:'Technical lead and rollout lead must sign off on completed checklist before proceeding to local UAT.'}
    ]
  },
  {id:'go-live-checklist', name:'Go-Live Checklist', owner:'Rollout Lead', stages:['8'],
    why:'Final verification that all readiness criteria are met before flipping the switch for users.',
    description:'The ultimate pre-flight check executed in the 24-48 hours before go-live for a specific market. It consolidates readiness across all dimensions: technical (environments ready, integrations tested), business (training complete, data loaded), support (hypercare team briefed, runbook available), and communication (go-live announcement drafted). It is the Rollout Lead\'s final gate — if any critical item is not green, go-live is postponed.',
    sections:['Technical Readiness (all tech enablement items complete)','Business Readiness (training delivered, data migrated, processes documented)','Support Readiness (hypercare team staffed, runbook distributed, monitoring active)','Communication Readiness (go-live announcement ready, support contacts published)','Stakeholder Approvals (business sponsor, IT lead, support lead sign-off)','Go/No-Go Decision','Rollback Plan Confirmed'],
    format:'One-page checklist with sign-off rows',
    tools:['Excel','Confluence','Word','Physical printout for war-room go-lives'],
    howToBuild:[
      {title:'Aggregate from upstream checklists',desc:'Pull key items from Tech Enablement Checklist, UAT results, training completion records, and support readiness assessment.'},
      {title:'Organize by readiness dimension',desc:'Group items into Technical, Business, Support, and Communication sections. Each section has a section-level Green/Red status.'},
      {title:'Define the decision rule',desc:'"All sections must be Green for Go. Any Red section = No-Go. Amber sections require documented risk acceptance from business sponsor."'},
      {title:'Schedule the go/no-go meeting',desc:'Hold the meeting 24-48 hours before planned go-live. Walk through each section with all stakeholders. Make the call together.'},
      {title:'Document the decision',desc:'Record go/no-go decision, any accepted risks, and the responsible parties. This is an auditable record of the go-live authorization.'}
    ]
  },
  {id:'change-mgmt-plan', name:'Change Management Plan', owner:'Change Manager', stages:['9'],
    why:'Structured approach to driving adoption — people don\'t change behavior without intentional communication, training, and support.',
    description:'The master plan for managing the people side of change. It addresses awareness (do people know the change is coming?), desire (do they want to adopt it?), knowledge (do they know how?), ability (can they actually do it?), and reinforcement (will they keep doing it?). The plan covers stakeholder analysis, communication strategy, training approach, resistance management, and adoption measurement. Without it, even great technology sits unused.',
    sections:['Change Impact Assessment','Stakeholder Analysis & Engagement Plan','Communication Strategy (audiences, channels, frequency)','Training Strategy (modalities, schedule, content)','Resistance Management Approach','Adoption Metrics & Measurement Plan','Reinforcement Strategy (post-launch sustainment)','Change Network (change champions per team/region)','Timeline Aligned to Delivery & Rollout'],
    format:'Comprehensive document (Word/Confluence) with action tracker',
    tools:['Confluence','Word','Prosci ADKAR framework','Survey tools (Forms, Qualtrics)','LMS for training'],
    howToBuild:[
      {title:'Assess change impact',desc:'For each affected user group: what changes in their daily work? How big is the change? How ready are they? Map impact by role, region, and business unit.'},
      {title:'Analyze stakeholders',desc:'Identify all affected stakeholders. Map their current awareness, support level, and influence. Categorize: Champions, Supporters, Neutral, Resistors.'},
      {title:'Design the communication strategy',desc:'Map messages to audience segments across the timeline: awareness phase → understanding phase → adoption phase → reinforcement phase.'},
      {title:'Plan training',desc:'Define training modalities (self-paced, instructor-led, hands-on labs). Schedule before go-live. Include role-based training paths.'},
      {title:'Build the change network',desc:'Recruit change champions in each team/region. Train them first. They become local advocates and first-line support.'},
      {title:'Define adoption metrics',desc:'How will you measure success? Login rates, feature usage, time-on-task, satisfaction scores, support ticket trends. Set targets.'}
    ]
  },
  {id:'comms-plan', name:'Communication Plan', owner:'Change Manager', stages:['9'],
    why:'Ensures the right message reaches the right audience at the right time through the right channel.',
    description:'A detailed matrix mapping every communication touchpoint across the transformation lifecycle. It defines who needs to hear what message, when they need to hear it, through which channel, and who is responsible for delivering it. The plan covers three phases: Demand Comms (what\'s coming), Rollout Comms (how to prepare), and Value Comms (what was achieved). It prevents communication gaps that lead to confusion, resistance, and low adoption.',
    sections:['Communication Matrix (audience × message × channel × timing × owner)','Key Messages per Phase','Channel Strategy (email, Slack, town hall, intranet, 1:1)','Communication Calendar','Feedback Mechanisms','Escalation Process for Communication Issues','Templates & Collateral List'],
    format:'Excel matrix + Confluence calendar',
    tools:['Excel/Sheets','Confluence','Email platforms','Slack','SharePoint/Intranet','Survey tools'],
    howToBuild:[
      {title:'Map audiences',desc:'List every audience that needs communication: executives, middle management, end users (by role), IT teams, support teams, external partners.'},
      {title:'Define key messages per phase',desc:'Demand phase: "What is changing and why." Rollout phase: "What you need to do to prepare." Value phase: "What we achieved together."'},
      {title:'Select channels per audience',desc:'Executives: monthly email summary + quarterly town hall. End users: Slack updates + training invitations. Managers: weekly briefing + FAQ document.'},
      {title:'Build the communication calendar',desc:'Plot every communication on a timeline aligned to the rollout schedule. Include: send date, audience, channel, owner, status.'},
      {title:'Create templates',desc:'Build reusable templates for each communication type: announcement email, FAQ document, town hall deck, Slack post format.'},
      {title:'Measure and adjust',desc:'Track open rates, attendance, feedback. If a message isn\'t landing, change the channel or the messenger.'}
    ]
  },
  {id:'demand-comms', name:'Demand Comms Pack', owner:'Change Manager', stages:['9'],
    why:'Builds awareness and buy-in for upcoming solutions before they arrive, reducing resistance.',
    description:'A collection of communication materials designed to inform stakeholders about upcoming changes 3-6 months before they arrive. The pack answers: "What is coming? Why now? How will it affect me? What do I need to do?" It builds anticipation and buy-in by connecting the change to business strategy and user pain points. Effective demand comms transform the narrative from "change is being done to us" to "this solves a problem we care about."',
    sections:['Executive Announcement (1-page brief for leadership cascade)','Stakeholder FAQ (anticipated questions with honest answers)','Impact Summary by Role (what changes for each user group)','Timeline Overview (when to expect what)','Benefits Statement (connected to strategic themes)','Feedback Channel (where to ask questions)'],
    format:'Pack of templates: email drafts, FAQ doc, one-pager, Slack posts',
    tools:['Word/Google Docs','Canva/PowerPoint for visuals','Email platform','Slack','SharePoint/Intranet'],
    howToBuild:[
      {title:'Start with the "why"',desc:'Lead with the business problem being solved, not the technology. "We\'re reducing order processing from 4 hours to 15 minutes" not "We\'re implementing a new ERP module."'},
      {title:'Create role-specific impact summaries',desc:'Each affected role gets a paragraph: "As a [role], you will see [these changes] starting [date]. This means [daily impact]. To prepare, [action needed]."'},
      {title:'Build the FAQ',desc:'Anticipate the top 20 questions. Include honest answers about timeline, training, and what won\'t change. Update as new questions emerge.'},
      {title:'Design the cascade plan',desc:'Executives hear first, then managers, then end users. Give managers talking points so they can reinforce the message with their teams.'},
      {title:'Open a feedback channel',desc:'Create a Slack channel, email alias, or form where people can ask questions. Respond within 24 hours. Feed common questions back into the FAQ.'}
    ]
  },
  {id:'rollout-comms', name:'Rollout Comms Pack', owner:'Change Manager', stages:['9'],
    why:'Provides practical guidance on how to prepare for and adopt new solutions during rollout.',
    description:'Actionable communication materials distributed 2-4 weeks before go-live that help users prepare for and successfully adopt the new solution. Unlike demand comms (which build awareness), rollout comms are practical: training schedules, quick-start guides, step-by-step instructions, environment access details, and support contacts. They reduce the anxiety of change by giving people concrete steps to follow.',
    sections:['Go-Live Announcement (date, what changes, immediate actions)','Quick Start Guide (how to access and do the basics)','Training Schedule & Registration','Step-by-Step Migration Guide (if users must take action)','Support Contact Card (who to call, where to log issues)','Known Limitations & Workarounds','Daily Tips Series (post-go-live drip campaign)'],
    format:'Multi-format pack: email, PDF guide, Slack posts, intranet page',
    tools:['Word/Canva for guides','Email platform','LMS for training registration','Slack','Video tools for tutorials'],
    howToBuild:[
      {title:'Create the quick-start guide',desc:'A 1-2 page visual guide showing how to access the new solution and complete the 3-5 most common tasks. Include screenshots and tips.'},
      {title:'Publish training schedule',desc:'List all training sessions with dates, times, modalities, and registration links. Include self-paced options for different time zones.'},
      {title:'Write the go-live announcement',desc:'Clear, concise: "Starting [date], [what changes]. Here\'s what you need to do: [3 actions]. For help: [support contact]."'},
      {title:'Prepare the support card',desc:'Wallet-sized (digital or physical) card with: support email, Slack channel, phone number, hours of operation, and how to log a ticket.'},
      {title:'Plan the drip campaign',desc:'After go-live, send daily/weekly tips: "Did you know you can [feature]?" Keeps adoption momentum going and surfaces lesser-known capabilities.'}
    ]
  },
  {id:'value-comms', name:'Value Comms Pack', owner:'Change Manager', stages:['9'],
    why:'Celebrates achievements and demonstrates ROI, reinforcing the value of transformation and building momentum.',
    description:'Communication materials that quantify and celebrate the business value achieved through delivered solutions. These are published 3-6 months after go-live when measurable results are available. They connect delivered capabilities to business outcomes using real data, quotes from users, and before/after comparisons. Value comms serve dual purpose: they reward the teams who delivered the value and build organizational confidence that transformation investments are paying off.',
    sections:['Value Highlight Summary (headline metrics)','Before/After Comparison (with data)','User Testimonials & Quotes','Success Story Narratives','ROI Summary (linked to KPI Dashboard)','Thank You / Recognition for Delivery Teams','Next Horizon Preview (what\'s coming next)'],
    format:'Executive summary email, intranet article, town hall slides',
    tools:['PowerPoint','Canva','Email platform','Video testimonials','KPI Dashboard data'],
    howToBuild:[
      {title:'Gather value data from BVA',desc:'Pull metrics from the Value Realization Report: actual vs. target KPIs, cost savings, time saved, revenue impact, error reduction.'},
      {title:'Collect user testimonials',desc:'Interview 3-5 real users who experienced the improvement. Get specific quotes about their before/after experience. Video is most impactful.'},
      {title:'Create before/after visuals',desc:'Design compelling visualizations: "Before: 4 hours manual processing. After: 15 minutes automated." Use real numbers, not projections.'},
      {title:'Write the narrative',desc:'Weave data and stories together: "When [team] faced [problem], the solution delivered [result]. As [user name] said: [quote]."'},
      {title:'Distribute widely',desc:'Share at town halls, in executive updates, on the intranet, and in team channels. Tag the delivery teams. Recognition drives engagement.'}
    ]
  },
  {id:'hypercare-plan', name:'Hypercare Plan', owner:'Support Lead', stages:['10'],
    why:'Defines the elevated support model for the critical post-go-live period, ensuring rapid issue resolution.',
    description:'A time-bound plan (typically 30-90 days post-go-live) that defines elevated support operations for a newly launched solution. During hypercare, response times are shorter, dedicated experts are on-call, and escalation paths are faster than steady-state support. The plan covers staffing, SLAs, escalation procedures, daily triage meetings, and the criteria for exiting hypercare and transitioning to the standard support model.',
    sections:['Hypercare Duration & Phases (e.g., Week 1-2: Intensive, Week 3-4: Standard Elevated, Week 5+: Transition)','Staffing Plan (dedicated support resources)','SLA Definitions (response/resolution times by severity)','Escalation Matrix (who to call for what)','Daily Triage Meeting Cadence','Issue Categories & Routing Rules','Monitoring & Alerting Setup','Exit Criteria (when to end hypercare)','Transition Plan to Steady-State Support'],
    format:'Word document or Confluence page with linked processes',
    tools:['ServiceNow','Jira Service Management','PagerDuty','Confluence','Slack (support channel)'],
    howToBuild:[
      {title:'Define hypercare phases',desc:'Phase 1 (Week 1-2): 24/7 dedicated team, 1-hour response for critical issues. Phase 2 (Week 3-6): Business hours dedicated team, 4-hour response. Phase 3 (Week 7+): Transition to BAU.'},
      {title:'Staff the team',desc:'Identify dedicated support engineers, product experts, and escalation contacts. Ensure coverage across time zones if global. Create on-call rotation.'},
      {title:'Set SLAs by severity',desc:'Critical (system down): 15-min response, 2-hour fix. High (major function broken): 1-hour response, 8-hour fix. Medium: 4-hour response, 2-day fix.'},
      {title:'Establish the triage process',desc:'Daily 15-minute triage meeting to review all open tickets, reprioritize, and assign. Twice-daily during Phase 1.'},
      {title:'Define exit criteria',desc:'Hypercare ends when: critical ticket count < 2 per week, knowledge base coverage > 80% of known issues, support team can resolve 90% without escalation.'},
      {title:'Plan the transition',desc:'Document the handover from hypercare team to BAU support: knowledge transfer sessions, runbook handoff, monitoring responsibility transfer.'}
    ]
  },
  {id:'ticket-log', name:'Ticket Log', owner:'Support Lead', stages:['10'],
    why:'Tracks all support requests for analysis, SLA compliance, and trend identification.',
    description:'The centralized record of every support request received during hypercare and beyond. Each ticket is logged with standardized fields enabling consistent triage, SLA tracking, and trend analysis. The log feeds into dashboards that show ticket volume trends, resolution times, most common issues, and SLA compliance. Over time, it reveals patterns that drive knowledge base articles, product improvements, and process optimization.',
    sections:['Ticket ID (auto-generated)','Submission Date/Time','Submitter (name, role, market)','Category (Bug/Question/How-To/Access/Data/Performance)','Severity (Critical/High/Medium/Low)','Description','Assigned To','Status (New/Triaged/In Progress/Waiting/Resolved/Closed)','Resolution Notes','Resolution Date/Time','SLA Compliance (Met/Breached)','Root Cause Category'],
    format:'ServiceNow/Jira Service Management, or structured ADO backlog',
    tools:['ServiceNow','Jira Service Management','Azure DevOps','Zendesk','Freshdesk'],
    howToBuild:[
      {title:'Set up the ticketing system',desc:'Configure the tool with standard ticket types, severity levels, status workflow, and SLA rules. Create auto-assignment rules by category.'},
      {title:'Define submission channels',desc:'Email alias, Slack bot, web portal, or in-app "Report Issue" button. Standardize so all tickets enter one system regardless of channel.'},
      {title:'Establish triage workflow',desc:'New tickets auto-assign to triage queue. Support lead reviews and assigns severity, category, and owner within SLA response time.'},
      {title:'Track SLA compliance',desc:'Configure automated SLA clocks. Alert when tickets approach SLA breach. Report SLA compliance daily during hypercare.'},
      {title:'Analyze trends weekly',desc:'Review: top issue categories, average resolution time, SLA compliance rate, ticket volume trend. Feed insights into knowledge base and product backlog.'}
    ]
  },
  {id:'support-runbook', name:'Support Runbook', owner:'Support Lead', stages:['10'],
    why:'Documented procedures for common issues, enabling faster resolution and knowledge transfer.',
    description:'A collection of step-by-step troubleshooting procedures for known issues and common support scenarios. Each runbook entry describes the symptom, diagnosis steps, resolution procedure, and escalation path if the procedure doesn\'t work. Runbooks enable any support engineer to resolve known issues consistently, reduce dependency on specific individuals, and dramatically reduce mean time to resolution (MTTR).',
    sections:['Issue Title & Symptom Description','Affected Component/Service','Diagnosis Steps (how to confirm the issue)','Resolution Procedure (step-by-step fix)','Verification Steps (how to confirm it is fixed)','Escalation Path (if procedure fails)','Related Issues & Known Workarounds','Last Updated Date & Author'],
    format:'Searchable knowledge base (Confluence, ServiceNow KB, Wiki)',
    tools:['Confluence','ServiceNow Knowledge Base','ADO Wiki','Notion','GitBook'],
    howToBuild:[
      {title:'Start with the top 20 issues',desc:'Analyze ticket history to find the most frequent issues. Write a runbook entry for each. These 20 entries will cover 80% of tickets.'},
      {title:'Use a standard template',desc:'Every entry follows the same structure: Symptom → Diagnosis → Resolution → Verification → Escalation. Consistency enables faster scanning.'},
      {title:'Write for the least experienced person',desc:'Assume the reader has basic skills but no specific product knowledge. Include exact commands, screenshots, and expected outputs at each step.'},
      {title:'Include "what not to do"',desc:'Warn against common mistakes: "Do NOT restart the service during business hours — this affects all users. Schedule a maintenance window instead."'},
      {title:'Keep it living',desc:'After every new issue type is resolved, add a runbook entry. Assign a monthly review owner to update stale entries and remove obsolete ones.'}
    ]
  },
  {id:'support-model', name:'Support Model Document', owner:'Support Lead', stages:['10'],
    why:'Defines steady-state support structure, escalation paths, and SLAs post-hypercare.',
    description:'The long-term support design document that defines how the solution will be supported after hypercare ends. It covers the support organizational structure (L1/L2/L3 tiers), staffing requirements, SLA definitions, escalation paths, tools and processes, knowledge management approach, and continuous improvement mechanisms. This document ensures the solution remains supported sustainably without relying on the original development team.',
    sections:['Support Tier Structure (L1: Service Desk, L2: Product Support, L3: Engineering)','Staffing Requirements per Tier','SLA Definitions by Severity','Escalation Matrix','On-Call Rotation','Tools & Systems (ticketing, monitoring, knowledge base)','Knowledge Management Process','Continuous Improvement (ticket trend analysis, KB updates)','Cost Model','Transition Plan from Hypercare'],
    format:'Formal document (Word/Confluence) approved by IT leadership',
    tools:['Word/Confluence','ServiceNow','Visio/Lucidchart for org charts','Excel for cost modeling'],
    howToBuild:[
      {title:'Design the tier structure',desc:'L1 (Service Desk): handles password resets, FAQ, basic triage. L2 (Product Support): resolves known issues using runbooks. L3 (Engineering): fixes bugs, investigates unknowns.'},
      {title:'Define SLAs per tier',desc:'L1 response: < 1 hour. L2 resolution: 4-8 hours for High, 2 days for Medium. L3 resolution: depends on complexity, tracked in sprint backlog.'},
      {title:'Build the escalation matrix',desc:'Clear rules: "If L1 cannot resolve in 30 minutes, escalate to L2. If L2 cannot resolve in 4 hours, escalate to L3." Include contact details.'},
      {title:'Plan knowledge transfer',desc:'Schedule 3-5 sessions where the delivery team transfers product knowledge to the support team. Record sessions. Update runbooks.'},
      {title:'Model the cost',desc:'Calculate ongoing support cost: headcount per tier × fully loaded cost + tool licenses + training investment. Compare to ticket volume projections.'},
      {title:'Get stakeholder sign-off',desc:'Present the model to IT leadership and business sponsors. Agree on SLAs, staffing, and budget. This is a binding operational commitment.'}
    ]
  },
  {id:'value-realization-report', name:'Value Realization Report', owner:'Business Value Analyst', stages:['11'],
    why:'Quantifies actual business value delivered versus planned, closing the feedback loop on investment decisions.',
    description:'A formal report published 3-6 months after go-live that compares actual business outcomes to the value hypotheses defined in the Lean Business Case. It measures hard metrics (cost savings, revenue, efficiency gains) and soft metrics (satisfaction, adoption, quality improvement). The report is the evidence base for portfolio investment decisions — it answers "Did this epic deliver the value we expected?" and informs future investment allocation.',
    sections:['Executive Summary','Original Value Hypothesis (from Lean Business Case)','Measurement Methodology','Results by KPI (baseline → target → actual)','ROI Calculation','Qualitative Benefits (user feedback, process improvement)','Gaps & Shortfalls Analysis','Recommendations (optimize, extend, or sunset)','Lessons Learned','Appendix (data sources, calculation details)'],
    format:'Formal report (Word/PDF) + executive summary deck',
    tools:['Word/PowerPoint','Power BI (data visualization)','Excel (ROI calculations)','Survey tools (user feedback)'],
    howToBuild:[
      {title:'Revisit the original hypothesis',desc:'Pull the Lean Business Case. What value was expected? What KPIs were defined? What were the baseline measurements?'},
      {title:'Collect actual data',desc:'Gather metrics from production systems, analytics, surveys, and interviews. Compare actual to baseline and target for each KPI.'},
      {title:'Calculate ROI',desc:'ROI = (Total Benefits - Total Costs) / Total Costs × 100. Include both tangible (cost savings) and quantified intangible benefits.'},
      {title:'Analyze gaps',desc:'Where did actual fall short of target? Why? Was it a delivery issue, adoption issue, or was the hypothesis wrong? Be honest.'},
      {title:'Make recommendations',desc:'Based on results: optimize (invest more to improve), extend (apply to new markets), maintain (keep as-is), or sunset (decommission if value insufficient).'},
      {title:'Present to portfolio',desc:'Share with LPM and executive sponsors. Feed findings into future investment decisions. Close the loop from strategy to execution to outcomes.'}
    ]
  },
  {id:'success-stories', name:'Success Stories', owner:'Business Value Analyst', stages:['10','11'],
    why:'Narrative proof of value that builds organizational confidence in the transformation and inspires further adoption.',
    description:'Compelling narrative documents that combine data with human stories to demonstrate the real-world impact of delivered solutions. Each success story follows a problem-solution-result arc, featuring real users, real metrics, and real quotes. They serve multiple purposes: building executive confidence in transformation investments, motivating delivery teams, inspiring adoption in markets that haven\'t rolled out yet, and providing content for value communications.',
    sections:['Headline (attention-grabbing result)','Challenge (the business problem, with user context)','Solution (what was delivered, briefly)','Results (quantified outcomes with specific numbers)','User Quote (direct testimonial)','Before/After Comparison','Key Metrics (2-3 headline numbers)','What\'s Next (future plans)'],
    format:'1-2 page narrative (Word, Confluence, or designed PDF)',
    tools:['Word/Google Docs','Canva for designed versions','Video tools for testimonials','Photography for user images'],
    howToBuild:[
      {title:'Identify story candidates',desc:'Look for teams or users with dramatic before/after results. Best stories have: large measurable impact, relatable problem, and an articulate user willing to be quoted.'},
      {title:'Interview the user/stakeholder',desc:'30-minute structured interview: What was the problem? How did it affect your work? What changed? What specific results did you see? Would you recommend it?'},
      {title:'Write the narrative arc',desc:'Structure: Hook (headline result) → Challenge (the pain) → Solution (what changed) → Results (measured impact) → Quote (human voice) → Future (what\'s next).'},
      {title:'Include hard metrics',desc:'Every story needs numbers: "Reduced from X to Y", "Saved Z hours per week", "$N in cost savings." Vague stories don\'t build confidence.'},
      {title:'Design for multiple formats',desc:'Create a full version (1-2 pages) and a summary version (3 bullets + 1 quote). Use the summary in presentations and the full version for deep reads.'},
      {title:'Distribute through value comms',desc:'Feed stories into the Value Comms Pack, town hall presentations, executive updates, and the intranet. Fresh stories on a quarterly cadence.'}
    ]
  },
  {id:'roi-analysis', name:'ROI Analysis', owner:'Business Value Analyst', stages:['11'],
    why:'Hard financial analysis comparing investment to returns, essential for portfolio funding decisions.',
    description:'A rigorous financial analysis that calculates the return on investment for a delivered epic or initiative. It compares total costs (development, infrastructure, licensing, change management, support) against total benefits (cost savings, revenue uplift, efficiency gains, risk reduction). The ROI analysis feeds directly into portfolio decision-making — high-ROI initiatives get more investment, low-ROI initiatives get scrutinized or sunset.',
    sections:['Cost Breakdown (development costs, infrastructure, licenses, change management, support, opportunity cost)','Benefit Breakdown (cost savings, revenue uplift, efficiency gains, risk reduction value, intangible benefits estimated)','ROI Calculation (simple and NPV)','Payback Period','Sensitivity Analysis (best case / expected / worst case)','Assumptions & Limitations','Comparison to Original Business Case Estimates','Recommendations'],
    format:'Excel model + executive summary (PPT/Word)',
    tools:['Excel (financial model)','PowerPoint (executive summary)','Power BI (visualization)'],
    howToBuild:[
      {title:'Compile total costs',desc:'Sum all costs: team capacity × cost rate × duration + infrastructure/cloud costs + license fees + change management + training + hypercare support. Include ongoing annual costs.'},
      {title:'Quantify benefits',desc:'Measure tangible: headcount savings (FTE × cost), time savings (hours × rate), error reduction (error cost × reduction %), revenue uplift. Estimate intangibles conservatively.'},
      {title:'Calculate ROI',desc:'Simple ROI = (Annual Benefit - Annual Cost) / Total Investment × 100. Also calculate NPV over 3-5 years with appropriate discount rate for the organization.'},
      {title:'Determine payback period',desc:'How many months until cumulative benefits exceed total investment? This is often more meaningful to executives than ROI percentage.'},
      {title:'Run sensitivity analysis',desc:'Model three scenarios: optimistic (120% of expected benefits), expected (100%), pessimistic (60%). Show ROI range. Identify which assumptions have the biggest impact.'},
      {title:'Present with recommendations',desc:'Don\'t just present numbers — tell the story. "This initiative cost $X, delivered $Y in annual value, pays back in Z months, and we recommend [extending to more markets / optimizing / maintaining]."'}
    ]
  },
  {id:'brd', name:'Business Requirements Document', owner:'Business Analyst', stages:['2','3','4'],
    why:'Captures the full scope of business needs in structured form. Without a BRD, requirements live in people\'s heads, leading to misunderstandings, missed scope, and costly rework.',
    description:'A structured document that captures the detailed business requirements for a feature, epic, or initiative. Unlike user stories (which focus on the "what" from a user perspective), the BRD captures the "why" (business drivers), "what" (functional and non-functional needs), "who" (stakeholders and users), and "how" (business rules, data needs, process flows). It serves as the authoritative reference for what the business needs, bridging the gap between stakeholder conversations and team-level user stories.',
    sections:['Executive Summary & Business Context','Stakeholder List & Roles','Business Objectives & Success Criteria','Functional Requirements (numbered & prioritized)','Non-Functional Requirements (performance, security, compliance)','Business Rules & Logic','Data Requirements & Mapping','Integration Points','Assumptions & Constraints','Out of Scope','Glossary of Business Terms'],
    format:'Structured document (Confluence, Word, ADO Wiki)',
    tools:['Confluence','Microsoft Word','Azure DevOps Wiki','Google Docs','Notion'],
    howToBuild:[
      {title:'Conduct stakeholder interviews',desc:'Meet with each stakeholder group individually. Use open-ended questions: "What problem does this solve?", "What does success look like?", "Walk me through your current process."'},
      {title:'Document current state',desc:'Map the as-is process, pain points, and workarounds. This grounds the requirements in reality and helps identify the real gaps to close.'},
      {title:'Elicit and organize requirements',desc:'Group requirements into functional, non-functional, data, and integration categories. Number each requirement for traceability. Use MoSCoW prioritization.'},
      {title:'Validate with stakeholders',desc:'Walk through the BRD in a formal review session. Capture feedback, resolve conflicts, and get sign-off. Ensure no requirements are missing or contradictory.'},
      {title:'Trace to user stories',desc:'Map each requirement to one or more user stories in the backlog. Update the Requirements Traceability Matrix to maintain the link from business need to deliverable.'}
    ]
  },
  {id:'process-flows', name:'Process Flow Diagrams', owner:'Business Analyst', stages:['2','3','4','8'],
    why:'Visualize business processes to uncover inefficiencies, gaps, and automation opportunities. Without process flows, teams implement solutions that don\'t fit the actual business workflow.',
    description:'Visual diagrams (BPMN, swimlane, or flowchart format) that document how business processes work today (current state) and how they should work after solution delivery (future state). They show the sequence of activities, decision points, roles involved, systems touched, data exchanged, and exception handling. Process flows are the BA\'s primary tool for bridging business understanding and technical design — they translate business language into a format both stakeholders and developers can follow.',
    sections:['Process Name & Scope','Trigger / Start Event','Swimlanes (one per role or system)','Activity Steps (with brief descriptions)','Decision Gates (with branch conditions)','System Interactions & Data Flow','Exception / Error Paths','End Events & Outcomes','Current State vs. Future State Comparison'],
    format:'Visual diagram (BPMN 2.0, swimlane, or flowchart)',
    tools:['Lucidchart','Visio','Mural/Miro','draw.io','Bizagi Modeler'],
    howToBuild:[
      {title:'Scope the process',desc:'Define start trigger, end event, and boundaries. Example: "From customer submits order to order confirmation email sent." Keep scope manageable.'},
      {title:'Map the current state (as-is)',desc:'Walk through the process with the people who actually do the work. Map every step, decision, handover, and system interaction. Include workarounds and pain points.'},
      {title:'Identify improvement opportunities',desc:'Mark bottlenecks, unnecessary approvals, manual steps ripe for automation, and handover points where information gets lost.'},
      {title:'Design the future state (to-be)',desc:'Create the target process incorporating the solution. Show what changes, what stays, and what gets eliminated. Highlight the impact of the new solution.'},
      {title:'Validate and iterate',desc:'Walk both diagrams through with stakeholders and the development team. Ensure the future state is technically feasible and meets business goals.'}
    ]
  },
  {id:'rtm', name:'Requirements Traceability Matrix', owner:'Business Analyst', stages:['3','4','6'],
    why:'Ensures every business requirement is implemented and tested. Without traceability, requirements fall through the cracks, and you can\'t prove the solution meets the business need.',
    description:'A cross-reference matrix that traces every business requirement through to its implementing user stories, design elements, test cases, and deployment verification. It answers critical questions: "Is every requirement covered by at least one story?", "Is every story traceable to a business need?", "Has every requirement been tested?" The RTM is the BA\'s primary tool for ensuring nothing gets lost between what was asked for and what gets delivered.',
    sections:['Requirement ID','Requirement Description','Priority (MoSCoW)','Source (who requested it)','Linked User Story ID(s)','Linked Test Case ID(s)','Implementation Status','Verification Status','Comments / Gaps'],
    format:'Spreadsheet or ADO query (Excel, Google Sheets, ADO traceability)',
    tools:['Excel/Google Sheets','Azure DevOps (linked work items)','Jira (traceability links)','Confluence (embedded table)'],
    howToBuild:[
      {title:'Extract all requirements',desc:'Pull every numbered requirement from the BRD. Each row in the matrix is one requirement with its ID, description, and priority.'},
      {title:'Link to user stories',desc:'For each requirement, identify which user story or stories implement it. Add story IDs to the matrix. Flag any requirement with no linked story.'},
      {title:'Link to test cases',desc:'For each requirement, identify which test cases verify it. Add test case IDs. Flag any requirement with no test coverage.'},
      {title:'Track implementation status',desc:'Update the matrix as stories are completed. Mark requirements as: Not Started, In Progress, Implemented, Verified, or Blocked.'},
      {title:'Review at milestones',desc:'At PI boundaries, sprint reviews, and UAT, review the matrix to confirm coverage. Any gaps represent risk — escalate to the PO and PM.'}
    ]
  },
  {id:'gap-analysis', name:'Gap Analysis', owner:'Business Analyst', stages:['2','3','8'],
    why:'Identifies the delta between current capabilities and target state. Without gap analysis, teams either overbuild or underbuild, wasting effort or leaving business needs unmet.',
    description:'A structured comparison of current state capabilities against target state requirements. For each business process, system capability, or data element, the gap analysis documents what exists today, what is needed, and what must change. It directly informs the scope of the solution, helps prioritize features, and identifies where change management effort is needed. In multi-market rollouts, gap analysis per country (CSA) ensures local needs are addressed.',
    sections:['Capability Area','Current State Description','Target State Description','Gap Description','Gap Severity (Critical / Major / Minor)','Proposed Resolution','Effort Estimate','Owner','Status'],
    format:'Structured table (Excel, Confluence, Word)',
    tools:['Excel/Google Sheets','Confluence','Word','Mural for collaborative workshops'],
    howToBuild:[
      {title:'Define capability areas',desc:'Break down the scope into logical areas: processes, system features, data, integrations, user experience, compliance. Each becomes a section in the analysis.'},
      {title:'Document current state per area',desc:'For each area, describe what exists today — tools, processes, data quality, manual steps, known limitations. Be factual and specific.'},
      {title:'Define target state per area',desc:'Describe what is needed to meet the business requirements. Reference the BRD and process flows for detail.'},
      {title:'Identify and classify gaps',desc:'For each area, describe the delta. Classify as Critical (blocks go-live), Major (degrades value), or Minor (nice to fix). This drives prioritization.'},
      {title:'Propose resolutions and assign owners',desc:'For each gap, define the resolution approach (build, configure, process change, accept) and assign an owner. Feed gap items into the backlog.'}
    ]
  },
  {id:'data-dictionary', name:'Data Dictionary', owner:'Business Analyst', stages:['3','4'],
    why:'Ensures everyone speaks the same data language. Without a data dictionary, "customer" means different things to different teams, causing integration failures and reporting inaccuracies.',
    description:'A catalog of all data entities, attributes, and business definitions used in the solution. It standardizes terminology across business and technical teams, defines data types, validation rules, sources, and ownership. The data dictionary is essential input for solution design (database schema, API contracts, integration mappings) and for testing (data-driven test scenarios). It prevents the costly misunderstandings that occur when business and technical teams have different definitions for the same terms.',
    sections:['Entity Name','Attribute Name','Business Definition','Data Type & Format','Validation Rules / Constraints','Source System','Owner / Steward','Example Values','Mapping to Target System Fields'],
    format:'Spreadsheet or data modeling tool',
    tools:['Excel/Google Sheets','Confluence','ERD tools (dbdiagram.io, Lucidchart)','Data catalog tools'],
    howToBuild:[
      {title:'Identify all data entities',desc:'List every business entity involved: Customer, Order, Product, Account, Transaction, etc. Work from the process flows and BRD to ensure completeness.'},
      {title:'Define attributes per entity',desc:'For each entity, list every attribute with its business definition, data type, format, and constraints. Example: "Customer Name — Full legal name — VARCHAR(200) — Required."'},
      {title:'Document business rules',desc:'Capture data validation rules: "Email must be unique per customer", "Order amount cannot be negative", "Status transitions follow: Draft → Submitted → Approved → Closed."'},

// ============================================================
// SEARCH INDEX
// ============================================================
let searchFilter = 'all';

function buildSearchIndex() {
  const index = [];
  ROLES.forEach(r => {
    index.push({type:'role', id:r.id, name:r.name, desc:r.layer + ' — ' + r.why.substring(0,100)+'...', data:r});
  });
  ARTIFACTS_MASTER.forEach(a => {
    index.push({type:'artifact', id:a.id, name:a.name, desc:'Owner: '+a.owner+' — '+a.why.substring(0,100)+'...', data:a});
  });
  ROLES.forEach(r => {
    r.handovers.forEach((h,i) => {
      const dir = h.to ? r.name+' → '+h.to : h.from+' → '+r.name;
      index.push({type:'handover', id:r.id+'-h-'+i, name:dir, desc:h.desc.substring(0,100)+'...', data:{...h, sourceRole:r}});
    });
  });
  return index;
}
const SEARCH_INDEX = buildSearchIndex();

function renderRoleList() {
  const el = document.getElementById('roleList');
  const layers = {};
  ROLES.forEach(r => {
    if(!layers[r.layer]) layers[r.layer]=[];
    layers[r.layer].push(r);
  });
  let html='';
  Object.keys(layers).forEach(layer => {
    layers[layer].forEach((r,i) => {
      html+=`<div class="role-item" data-role="${r.id}" onclick="selectRole('${r.id}')">
        <div class="role-icon" style="background:${r.color}20;color:${r.color}"><i class="${r.icon}"></i></div>
        <div><div class="role-name">${r.name}</div><div class="role-layer">${r.layer}</div></div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function selectRole(id) {
  const r = ROLES.find(x=>x.id===id);
  if(!r) return;
  document.querySelectorAll('.role-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.role===id);
  });
  renderRoleDetail(r);
}

function renderRoleDetail(r) {

// ============================================================
// SEARCH
// ============================================================
function handleSearch(query) {
  const el = document.getElementById('searchResults');
  if(!query || query.length<2) { el.classList.remove('visible'); return; }
  const q = query.toLowerCase();
  let results = SEARCH_INDEX.filter(item => {
    if(searchFilter!=='all' && item.type!==searchFilter) return false;
    return item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q);
  });
  if(results.length===0) {
    el.innerHTML='<div class="search-result-item"><div class="result-desc">No results found</div></div>';
  } else {
    el.innerHTML = results.slice(0,15).map(r => `<div class="search-result-item" onclick="handleSearchClick('${r.type}','${r.id}')">
      <span class="result-type ${r.type}">${r.type}</span>
      <span class="result-title">${highlightMatch(r.name,q)}</span>
      <div class="result-desc">${r.desc}</div>
    </div>`).join('');
  }
  el.classList.add('visible');
}

function highlightMatch(text,query) {
  const idx = text.toLowerCase().indexOf(query);
  if(idx===-1) return text;
  return text.substring(0,idx)+'<strong style="color:var(--accent)">'+text.substring(idx,idx+query.length)+'</strong>'+text.substring(idx+query.length);
}

function handleSearchClick(type,id) {
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('globalSearch').value='';
  if(type==='role') {
    switchView('roles');
    selectRole(id);
  } else if(type==='artifact') {
    const art = ARTIFACTS_MASTER.find(a=>a.id===id);
    if(art) showArtifactModal(art.name);
  } else if(type==='handover') {
    const parts = id.split('-h-');
    switchView('roles');
    selectRole(parts[0]);
    setTimeout(()=>{
      const tabs = document.querySelectorAll('.detail-tab');
      if(tabs[2]) tabs[2].click();
    },100);
  }
}

function toggleFilter(btn,filter) {
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  searchFilter=filter;
  const q = document.getElementById('globalSearch').value;
  if(q) handleSearch(q);
}

// ============================================================
// MODAL
// ============================================================
function showArtifactModal(name) {
  const art = ARTIFACTS_MASTER.find(a=>a.name===name);
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent=name;
  let body='';
  if(art) {
    // Owner badge
    body+=`<div style="margin-bottom:14px"><span class="modal-owner-badge">👤 Owner: ${art.owner}</span></div>`;

    // Why box
    if(art.why) {
      body+=`<div class="modal-why-box"><strong>Why is this needed?</strong><br>${art.why}</div>`;
    }

    // Description
    if(art.description) {
      body+=`<div class="modal-section"><div class="modal-section-title">Description</div><p style="margin:0;line-height:1.6">${art.description}</p></div>`;
    }

    // Sections / Contents
    if(art.sections && art.sections.length) {
      body+=`<div class="modal-section"><div class="modal-section-title">Key Sections / Contents</div><ul style="margin:0;padding-left:20px">`;
      art.sections.forEach(s=>{ body+=`<li style="margin-bottom:4px">${s}</li>`; });
      body+=`</ul></div>`;
    }

    // Format & Tools
    if(art.format || (art.tools && art.tools.length)) {
      body+=`<div class="modal-section"><div class="modal-section-title">Format & Tools</div><div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">`;
      if(art.format) body+=`<span class="modal-format-tag">📄 ${art.format}</span>`;
      if(art.tools) art.tools.forEach(t=>{ body+=`<span class="modal-tool-tag">🛠 ${t}</span>`; });
      body+=`</div></div>`;
    }

    // How to Build
    if(art.howToBuild && art.howToBuild.length) {
      body+=`<div class="modal-section"><div class="modal-section-title">How to Build — Step by Step</div><ol class="build-steps">`;
      art.howToBuild.forEach(step=>{
        body+=`<li class="build-step"><strong>${step.title}</strong><br><span style="color:var(--gray-600);font-size:13px">${step.desc}</span></li>`;
      });
      body+=`</ol></div>`;
    }

    // Used in Stages
    body+=`<div class="modal-section"><div class="modal-section-title">Used in Stages</div><div style="display:flex;flex-wrap:wrap;gap:4px">${art.stages.map(sid=>{const st=STAGES.find(s=>s.id===sid);return st?'<span class="handover-artifact-tag" style="margin:2px">'+st.number+'. '+st.name+'</span>':'';}).join('')}</div></div>`;

    // Related Roles
    const relatedRoles = ROLES.filter(r=>r.artifacts.includes(name));
    if(relatedRoles.length) {
      body+=`<div class="modal-section"><div class="modal-section-title">Related Roles</div><div style="display:flex;flex-wrap:wrap;gap:4px">${relatedRoles.map(r=>'<span class="handover-artifact-tag" style="margin:2px;cursor:pointer" onclick="closeModal();switchView(\'roles\');selectRole(\''+r.id+'\')">'+r.name+'</span>').join('')}</div></div>`;
    }
  } else {
    body=`<p>Artifact details for "${name}".</p>`;
  }
  document.getElementById('modalBody').innerHTML=body;
  overlay.classList.add('visible');
}

function closeModal(event) {
  if(event && event.target!==event.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('visible');
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function switchView(view) {
  document.querySelectorAll('.view-container').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>{
    if((view==='roles'&&b.textContent.includes('Role'))||(view==='timeline'&&b.textContent.includes('Timeline')))
      b.classList.add('active');
  });
}

// Close search on click outside
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-container'))
    document.getElementById('searchResults').classList.remove('visible');
});

// ============================================================
// INIT
// ============================================================
