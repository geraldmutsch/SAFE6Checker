<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFe 6.0 Advisor</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --primary: #1a365d;
  --primary-light: #2b6cb0;
  --primary-lighter: #ebf8ff;
  --accent: #ed8936;
  --accent-light: #fbd38d;
  --success: #38a169;
  --danger: #e53e3e;
  --gray-50: #f7fafc;
  --gray-100: #edf2f7;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e0;
  --gray-400: #a0aec0;
  --gray-500: #718096;
  --gray-600: #4a5568;
  --gray-700: #2d3748;
  --gray-800: #1a202c;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-800); line-height: 1.6; }
a { text-decoration: none; color: var(--primary-light); }

/* Header */
.header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 0; position: sticky; top:0; z-index:100; box-shadow: var(--shadow-lg); }
.header-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding: 0 24px; }
.logo { display:flex; align-items:center; gap:12px; padding: 16px 0; }
.logo-icon { width:42px; height:42px; background: var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; }
.logo h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.logo span { font-size:12px; opacity:.8; display:block; font-weight:400; }
.nav { display:flex; gap:4px; }
.nav button { background:none; border:none; color:rgba(255,255,255,.7); padding:12px 20px; font-size:14px; font-weight:500; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; border-radius: 6px 6px 0 0; }
.nav button:hover { color:white; background:rgba(255,255,255,.1); }
.nav button.active { color:white; border-bottom-color: var(--accent); background:rgba(255,255,255,.1); }

/* Search bar */
.search-bar { max-width:1400px; margin:0 auto; padding:20px 24px 0; }
.search-container { position:relative; }
.search-container input { width:100%; padding:14px 20px 14px 48px; border:2px solid var(--gray-200); border-radius:12px; font-size:15px; background:white; transition:all .2s; box-shadow: var(--shadow); }
.search-container input:focus { outline:none; border-color:var(--primary-light); box-shadow: 0 0 0 3px rgba(43,108,176,.15); }
.search-container .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--gray-400); font-size:18px; }
.search-filters { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.filter-chip { padding:6px 16px; border-radius:20px; border:1px solid var(--gray-300); background:white; font-size:13px; cursor:pointer; transition:all .2s; font-weight:500; }
.filter-chip:hover { border-color:var(--primary-light); color:var(--primary-light); }
.filter-chip.active { background:var(--primary); color:white; border-color:var(--primary); }

/* Search results dropdown */
.search-results { position:absolute; top:100%; left:0; right:0; background:white; border:1px solid var(--gray-200); border-radius:12px; margin-top:8px; box-shadow:var(--shadow-lg); max-height:500px; overflow-y:auto; z-index:50; display:none; }
.search-results.visible { display:block; }
.search-result-item { padding:14px 20px; border-bottom:1px solid var(--gray-100); cursor:pointer; transition:background .15s; }
.search-result-item:hover { background:var(--gray-50); }
.search-result-item:last-child { border-bottom:none; }
.result-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; text-transform:uppercase; margin-right:8px; }
.result-type.role { background:#ebf8ff; color:#2b6cb0; }
.result-type.artifact { background:#f0fff4; color:#38a169; }
.result-type.handover { background:#fff5f5; color:#e53e3e; }
.result-title { font-weight:600; font-size:15px; }
.result-desc { font-size:13px; color:var(--gray-500); margin-top:2px; }

/* Main content */
.main { max-width:1400px; margin:0 auto; padding:20px 24px 60px; }

/* Role Explorer */
.role-grid { display:grid; grid-template-columns:280px 1fr; gap:24px; margin-top:20px; }
.role-list { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; max-height: calc(100vh - 220px); display:flex; flex-direction:column; }
.role-list-header { padding:16px 20px; background:var(--gray-50); border-bottom:1px solid var(--gray-200); font-weight:600; font-size:14px; color:var(--gray-600); }
.role-list-items { overflow-y:auto; flex:1; }
.role-item { padding:12px 20px; border-bottom:1px solid var(--gray-100); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:12px; }
.role-item:hover { background:var(--primary-lighter); }
.role-item.active { background:var(--primary); color:white; }
.role-item .role-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.role-item.active .role-icon { background:rgba(255,255,255,.2); }
.role-item .role-name { font-weight:500; font-size:14px; }
.role-item .role-layer { font-size:11px; opacity:.7; }

/* Role Detail */
.role-detail { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.role-detail-header { padding:28px 32px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color:white; }
.role-detail-header h2 { font-size:26px; font-weight:700; margin-bottom:4px; }
.role-detail-header .role-layer-badge { display:inline-block; background:rgba(255,255,255,.2); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; margin-bottom:12px; }
.role-detail-header .why-needed { background:rgba(255,255,255,.1); border-radius:8px; padding:14px 18px; margin-top:16px; font-size:14px; line-height:1.7; border-left:3px solid var(--accent); }
.role-detail-header .why-label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--accent-light); margin-bottom:4px; }

.detail-tabs { display:flex; border-bottom:1px solid var(--gray-200); background:var(--gray-50); }
.detail-tab { padding:12px 24px; font-size:14px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; color:var(--gray-500); transition:all .2s; background:none; border-top:none; border-left:none; border-right:none; }
.detail-tab:hover { color:var(--gray-700); }
.detail-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

.detail-content { padding:24px 32px; }
.detail-section { margin-bottom:24px; }
.detail-section h3 { font-size:16px; font-weight:600; margin-bottom:12px; color:var(--primary); display:flex; align-items:center; gap:8px; }
.detail-section h3 i { color:var(--accent); }

.activity-list { list-style:none; }
.activity-list li { padding:10px 16px; border-left:3px solid var(--gray-200); margin-bottom:8px; background:var(--gray-50); border-radius:0 6px 6px 0; font-size:14px; }
.activity-list li:hover { border-left-color:var(--accent); }

.artifact-card { display:inline-flex; align-items:center; gap:8px; background:var(--gray-50); border:1px solid var(--gray-200); padding:8px 16px; border-radius:8px; margin:4px; font-size:13px; cursor:pointer; transition:all .2s; }
.artifact-card:hover { border-color:var(--primary-light); background:var(--primary-lighter); transform:translateY(-1px); }
.artifact-card i { color:var(--accent); }

.handover-card { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:8px; padding:16px; margin-bottom:12px; }
.handover-card .handover-direction { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.handover-from, .handover-to { font-weight:600; font-size:14px; color:var(--primary); }
.handover-arrow { color:var(--accent); font-size:18px; }
.handover-desc { font-size:13px; color:var(--gray-600); }
.handover-artifacts { margin-top:8px; display:flex; flex-wrap:wrap; gap:4px; }
.handover-artifact-tag { font-size:11px; background:var(--primary-lighter); color:var(--primary-light); padding:2px 8px; border-radius:12px; }

/* Timeline View */
.timeline-container { margin-top:20px; }
.timeline-stage { background:white; border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; transition:all .3s; }
.timeline-stage.expanded { box-shadow:var(--shadow-lg); }
.stage-header { padding:20px 24px; cursor:pointer; display:flex; align-items:center; gap:16px; transition:background .2s; }
.stage-header:hover { background:var(--gray-50); }
.stage-number { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; color:white; flex-shrink:0; }
.stage-info { flex:1; }
.stage-info h3 { font-size:18px; font-weight:600; color:var(--gray-800); }
.stage-info .stage-substeps { font-size:13px; color:var(--gray-500); margin-top:2px; }
.stage-toggle { font-size:20px; color:var(--gray-400); transition:transform .3s; }
.timeline-stage.expanded .stage-toggle { transform:rotate(180deg); }

.stage-body { display:none; border-top:1px solid var(--gray-200); }
.timeline-stage.expanded .stage-body { display:block; }

.stage-tabs { display:flex; border-bottom:1px solid var(--gray-200); background:var(--gray-50); }
.stage-tab { padding:10px 20px; font-size:13px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; color:var(--gray-500); transition:all .2s; background:none; border-top:none; border-left:none; border-right:none; text-transform:uppercase; letter-spacing:.5px; }
.stage-tab:hover { color:var(--gray-700); }
.stage-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

.stage-content { padding:24px; }

/* People tab */
.raci-table { width:100%; border-collapse:separate; border-spacing:0; border:1px solid var(--gray-200); border-radius:8px; overflow:hidden; font-size:14px; }
.raci-table th { background:var(--primary); color:white; padding:12px 16px; text-align:left; font-weight:600; font-size:13px; }
.raci-table td { padding:10px 16px; border-bottom:1px solid var(--gray-100); }
.raci-table tr:last-child td { border-bottom:none; }
.raci-table tr:hover td { background:var(--gray-50); }
.raci-badge { display:inline-block; width:28px; height:28px; border-radius:50%; text-align:center; line-height:28px; font-weight:700; font-size:12px; }
.raci-r { background:#fed7d7; color:#c53030; }
.raci-a { background:#fefcbf; color:#975a16; }
.raci-c { background:#c6f6d5; color:#276749; }
.raci-i { background:#bee3f8; color:#2a69ac; }

/* Process tab */
.process-step { display:flex; gap:16px; margin-bottom:20px; position:relative; padding-left:32px; }
.process-step::before { content:''; position:absolute; left:12px; top:28px; bottom:-20px; width:2px; background:var(--gray-200); }
.process-step:last-child::before { display:none; }
.process-dot { position:absolute; left:4px; top:4px; width:18px; height:18px; border-radius:50%; background:var(--primary); border:3px solid var(--primary-lighter); z-index:1; }
.process-card { flex:1; background:var(--gray-50); border:1px solid var(--gray-200); border-radius:8px; padding:16px; }
.process-card h4 { font-size:15px; font-weight:600; margin-bottom:8px; color:var(--gray-800); }
.process-card .process-who { font-size:13px; color:var(--primary-light); margin-bottom:6px; font-weight:500; }
.process-card .process-what { font-size:13px; color:var(--gray-600); }
.process-card .process-artifacts { margin-top:8px; display:flex; flex-wrap:wrap; gap:4px; }

/* Artifacts tab */
.artifact-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
.artifact-detail-card { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:8px; padding:18px; transition:all .2s; }
.artifact-detail-card:hover { border-color:var(--primary-light); box-shadow:var(--shadow); }
.artifact-detail-card h4 { font-size:15px; font-weight:600; color:var(--gray-800); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.artifact-detail-card h4 i { color:var(--accent); }
.artifact-detail-card .artifact-owner { font-size:12px; color:var(--primary-light); font-weight:500; margin-bottom:8px; }
.artifact-detail-card .artifact-desc { font-size:13px; color:var(--gray-600); }
.artifact-detail-card .artifact-why { font-size:12px; color:var(--gray-500); margin-top:8px; padding-top:8px; border-top:1px solid var(--gray-200); font-style:italic; }

/* Stage colors */
.stage-color-1 { background: #1a365d; }
.stage-color-2 { background: #2b6cb0; }
.stage-color-3 { background: #2c7a7b; }
.stage-color-4 { background: #276749; }
.stage-color-5 { background: #975a16; }
.stage-color-6 { background: #c05621; }
.stage-color-7 { background: #9b2c2c; }
.stage-color-8 { background: #702459; }
.stage-color-9 { background: #553c9a; }
.stage-color-10 { background: #2a4365; }
.stage-color-11 { background: #22543d; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; }
.modal-overlay.visible { opacity:1; pointer-events:all; }
.modal { background:white; border-radius:12px; max-width:800px; width:92%; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--gray-200); display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:18px; font-weight:600; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--gray-400); padding:4px 8px; border-radius:4px; }
.modal-close:hover { color:var(--gray-600); background:var(--gray-100); }
.modal-body { padding:24px; }
.modal-body p { margin-bottom:12px; font-size:14px; color:var(--gray-600); }
.modal-body h4 { font-size:15px; font-weight:600; margin-bottom:8px; margin-top:16px; color:var(--gray-800); }
.modal-section { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:8px; padding:18px; margin-bottom:16px; }
.modal-section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--primary-light); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.modal-section-title i { color:var(--accent); }
.modal-section p, .modal-section li { font-size:14px; color:var(--gray-700); line-height:1.7; }
.modal-section ul { list-style:none; padding:0; }
.modal-section ul li { padding:6px 0 6px 20px; position:relative; border-bottom:1px solid var(--gray-100); }
.modal-section ul li:last-child { border-bottom:none; }
.modal-section ul li::before { content:'\\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; position:absolute; left:0; top:8px; font-size:11px; color:var(--success); }
.build-step { counter-increment:build-step; padding:10px 0 10px 36px; position:relative; border-bottom:1px solid var(--gray-100); }
.build-step:last-child { border-bottom:none; }
.build-step::before { content:counter(build-step); position:absolute; left:0; top:10px; width:24px; height:24px; border-radius:50%; background:var(--primary); color:white; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.build-steps { counter-reset:build-step; list-style:none; padding:0; }
.build-step-title { font-weight:600; font-size:14px; color:var(--gray-800); }
.build-step-desc { font-size:13px; color:var(--gray-600); margin-top:2px; }
.modal-tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.modal-owner-badge { display:inline-flex; align-items:center; gap:6px; background:var(--primary); color:white; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; margin-bottom:12px; }
.modal-why-box { background:linear-gradient(135deg, #fffaf0 0%, #fff5eb 100%); border:1px solid #fbd38d; border-left:4px solid var(--accent); border-radius:8px; padding:16px; margin-bottom:16px; }
.modal-why-box .why-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); margin-bottom:6px; }
.modal-why-box p { font-size:14px; color:var(--gray-700); margin:0; }
.modal-tool-tag { display:inline-block; background:var(--primary-lighter); color:var(--primary-light); padding:3px 10px; border-radius:12px; font-size:12px; font-weight:500; margin:2px; }
.modal-format-tag { display:inline-block; background:#f0fff4; color:var(--success); padding:3px 10px; border-radius:12px; font-size:12px; font-weight:500; margin:2px; border:1px solid #c6f6d5; }

/* Responsive */
@media(max-width:900px) {
  .role-grid { grid-template-columns:1fr; }
  .header-inner { flex-direction:column; gap:8px; padding-bottom:8px; }
  .nav { overflow-x:auto; width:100%; }
  .artifact-grid { grid-template-columns:1fr; }
}

/* View toggle */
.view-container { display:none; }
.view-container.active { display:block; }

/* Tooltip */
.tooltip { position:relative; }
.tooltip .tooltip-text { visibility:hidden; background:var(--gray-800); color:white; font-size:12px; padding:6px 10px; border-radius:6px; position:absolute; bottom:125%; left:50%; transform:translateX(-50%); white-space:nowrap; z-index:10; }
.tooltip:hover .tooltip-text { visibility:visible; }

.empty-state { text-align:center; padding:60px 20px; color:var(--gray-400); }
.empty-state i { font-size:48px; margin-bottom:16px; }
.empty-state p { font-size:16px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">S6</div>
      <h1>SAFe 6.0 Advisor<span>Enterprise Transformation Reference</span></h1>
    </div>
    <div class="nav">
      <button class="active" onclick="switchView('roles')"><i class="fas fa-users"></i>&nbsp; Role Explorer</button>
      <button onclick="switchView('timeline')"><i class="fas fa-stream"></i>&nbsp; Delivery Timeline</button>
    </div>
  </div>
</div>

<div class="search-bar">
  <div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="globalSearch" placeholder="Search roles, artifacts, handover points..." oninput="handleSearch(this.value)" onfocus="handleSearch(this.value)" />
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="search-filters">
    <button class="filter-chip active" onclick="toggleFilter(this,'all')">All</button>
    <button class="filter-chip" onclick="toggleFilter(this,'role')"><i class="fas fa-user"></i> Roles</button>
    <button class="filter-chip" onclick="toggleFilter(this,'artifact')"><i class="fas fa-file-alt"></i> Artifacts</button>
    <button class="filter-chip" onclick="toggleFilter(this,'handover')"><i class="fas fa-exchange-alt"></i> Handover Points</button>
  </div>
</div>

<div class="main">
  <!-- Role Explorer View -->
  <div id="view-roles" class="view-container active">
    <div class="role-grid">
      <div class="role-list">
        <div class="role-list-header"><i class="fas fa-layer-group"></i> SAFe 6.0 Roles</div>
        <div class="role-list-items" id="roleList"></div>
      </div>
      <div class="role-detail" id="roleDetail">
        <div class="empty-state">
          <i class="fas fa-hand-pointer"></i>
          <p>Select a role to explore its responsibilities, artifacts, and handover points</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Timeline View -->
  <div id="view-timeline" class="view-container">
    <div class="timeline-container" id="timelineContainer"></div>
  </div>
</div>

<!-- Modal for artifact detail -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================
// COMPREHENSIVE SAFe 6.0 DATA MODEL
// ============================================================

const ROLES = [
  {
    id:'lpm', name:'Lean Portfolio Manager', layer:'Portfolio', icon:'fas fa-briefcase', color:'#1a365d',
    why:'Connects enterprise strategy to execution. Without this role, investments scatter across unaligned initiatives, wasting budget and diluting impact. The LPM ensures every dollar and every team is working toward strategic outcomes.',
    daily:[
      'Review portfolio Kanban board and flow metrics',
      'Facilitate investment horizon discussions with stakeholders',
      'Align portfolio backlog to strategic themes and OKRs',
      'Monitor guardrails and lean budgets across value streams',
      'Engage with Epic Owners on business case progression',
      'Evaluate portfolio-level KPIs and pivot decisions'
    ],
    artifacts:['Portfolio Kanban','Portfolio Backlog','Strategic Themes','Lean Business Case','Portfolio Vision','Guardrails','KPI Dashboard'],
    handovers:[
      {to:'Epic Owner',artifacts:['Approved Epics','Lean Business Case'],desc:'Approved epics with funding and strategic context handed to Epic Owners for decomposition and execution planning.'},
      {to:'RTE',artifacts:['Portfolio Roadmap','Strategic Themes'],desc:'Strategic direction and prioritized epics communicated to RTEs for ART-level planning alignment.'},
      {from:'Epic Owner',artifacts:['Epic Progress Report','Value Metrics'],desc:'Receives epic progress and value realization data to inform portfolio decisions.'}
    ]
  },
  {
    id:'eo', name:'Epic Owner', layer:'Portfolio / Large Solution', icon:'fas fa-chess-queen', color:'#2b6cb0',
    why:'Bridges portfolio strategy and ART execution. Epics are too large for any single team — the Epic Owner shepherds them from hypothesis through delivery, ensuring the business case holds and value is realized across multiple ARTs.',
    daily:[
      'Refine and progress Lean Business Cases through the portfolio Kanban',
      'Collaborate with Solution and Product Management on epic decomposition',
      'Track epic-level value hypotheses and leading indicators',
      'Coordinate cross-ART dependencies for large epics',
      'Present epic status and pivot recommendations to LPM',

    sections:['Investment Guardrails (spending limits, allocation percentages per theme)','Technology Guardrails (approved tech stack, cloud policies, security standards)','Compliance Guardrails (regulatory requirements, audit needs)','Capacity Guardrails (enabler allocation, innovation time)','Decision Authority Matrix (what can be decided at each level)','Exception Process (how to request a guardrail waiver)'],
    format:'One-page policy document + decision matrix',
    tools:['Confluence','SharePoint','Policy management tool'],
    howToBuild:[
      {title:'Identify decision domains',desc:'List the areas where portfolio-level guidance is needed: investment, technology, compliance, capacity, hiring, vendor selection.'},
      {title:'Set quantitative boundaries',desc:'Make guardrails measurable: "No single epic > 15% of portfolio budget", "Minimum 20% capacity for enablers", "All new services deployed to cloud".'},
      {title:'Define the decision authority matrix',desc:'Create a RACI for decision types: what ARTs can decide alone, what needs portfolio approval, what needs executive sign-off.'},
      {title:'Create the exception process',desc:'Document how to request a guardrail waiver: who approves, what evidence is needed, and how fast the decision must be made.'},
      {title:'Communicate and reinforce',desc:'Present guardrails at PI Planning, post them visibly, and review compliance quarterly. Adjust guardrails as the portfolio matures.'}
    ]
  },
  {id:'kpi-dashboard', name:'KPI Dashboard', owner:'Business Value Analyst', stages:['1','5','11'],
    why:'Real-time visibility into whether strategic goals are being achieved. Without it, you can\'t know if you\'re winning.',
    description:'A live, auto-refreshing dashboard that tracks strategic KPIs at the portfolio level. It shows both leading indicators (adoption rate, feature usage, cycle time) and lagging indicators (revenue impact, cost savings, customer satisfaction). Each KPI is linked to a strategic theme and has a baseline, target, and trend line. The dashboard is the primary tool for portfolio-level steering — enabling data-driven decisions about where to invest more, where to pivot, and where to stop.',
    sections:['KPI per Strategic Theme (2-3 KPIs each)','Baseline vs. Target vs. Actual','Trend Charts (monthly/quarterly)','Leading Indicators (fast signals)','Lagging Indicators (outcome confirmation)','Traffic Light Status (Red/Amber/Green)','Drill-down to Epic-level Contribution'],
    format:'Interactive dashboard (Power BI, Tableau, ADO Dashboard)',
    tools:['Power BI','Tableau','Azure DevOps Analytics','Google Data Studio','Excel for initial builds'],
    howToBuild:[
      {title:'Map KPIs to strategic themes',desc:'For each strategic theme, define 2-3 KPIs. Mix leading (measurable in weeks) and lagging (measurable in months) indicators.'},
      {title:'Establish baselines',desc:'Measure current state for every KPI before any intervention. This is your comparison point for value realization.'},
      {title:'Set targets with timeframes',desc:'Define what success looks like: "Reduce manual processing time from 4 hours to 45 minutes by Q3 2026."'},
      {title:'Connect data sources',desc:'Wire up the dashboard to ADO (delivery metrics), business systems (outcome metrics), and survey tools (satisfaction metrics).'},
      {title:'Build drill-down capability',desc:'Allow users to click from portfolio KPI → strategic theme → contributing epics → features → team metrics. Enable root cause analysis.'},
      {title:'Establish review cadence',desc:'Review KPIs monthly in portfolio sync. Flag any KPI trending below target for root cause analysis and corrective action.'}
    ]
  },
  {id:'demand-intake-log', name:'Demand Intake Log', owner:'Epic Owner', stages:['2'],
    why:'Captures all incoming demands in a structured way, preventing lost requests and enabling fair prioritization.',
    description:'A centralized register where all incoming business and technical requests are logged, regardless of source. Every demand — from executive requests to field escalations to technical debt items — enters through this single funnel. Each entry captures who requested it, the business problem, estimated impact, urgency, and strategic alignment. The log prevents "loudest voice wins" prioritization by making all demands visible and comparable using consistent criteria.',
    sections:['Demand ID (auto-incrementing)','Requester Name & Business Unit','Demand Title & Description','Business Problem Statement','Estimated Business Impact (High/Medium/Low)','Urgency (Critical/High/Medium/Low)','Strategic Theme Alignment','Date Submitted','Current Status (New/Under Review/Approved/Rejected/Parked)','Epic Owner Assigned','Disposition Notes'],
    format:'Shared spreadsheet, ADO backlog, or ServiceNow request form',
    tools:['Azure DevOps (backlog items)','ServiceNow','Jira Service Management','SharePoint List','Excel/Sheets'],
    howToBuild:[
      {title:'Create the intake form',desc:'Build a standardized form with required fields: demand title, business problem, requester, impact estimate, urgency, and strategic theme. Keep it short — max 10 fields.'},
      {title:'Define the submission channel',desc:'Establish one official intake channel: a form, a Slack workflow, an email alias, or an ADO form. Kill all other shadow channels.'},
      {title:'Set SLA for initial review',desc:'Every demand gets an initial review within 5 business days. The Epic Owner triages: accept for analysis, reject with explanation, or park for later.'},
      {title:'Create the review workflow',desc:'New demands land in "New" status. Epic Owner moves to "Under Review". After triage: "Approved" (moves to Portfolio Kanban), "Rejected" (with rationale), or "Parked" (revisit next quarter).'},
      {title:'Report intake metrics',desc:'Track: demands submitted per month, average time to triage, approval rate, rejection reasons. Use this to improve the intake process.'}
    ]
  },
  {id:'program-backlog', name:'Program Backlog', owner:'Product Manager', stages:['3'],
    why:'The bridge between portfolio epics and team-level work. Ensures features are properly prioritized and ready for teams.',
    description:'The prioritized list of features that the ART will deliver over the next 2-3 PIs. Features are decomposed from portfolio epics by the Product Manager and represent shippable increments of value that typically take one PI or less to complete. The backlog is the primary input to PI Planning — it determines what the ART will commit to. Features are ranked using WSJF and must include acceptance criteria and a benefit hypothesis before entering a PI.',
    sections:['Feature ID & Name','Parent Epic','Benefit Hypothesis','Acceptance Criteria','WSJF Score','Size Estimate (story points or T-shirt)','Target PI','Assigned Team(s)','Feature Status (Funnel/Analyzing/Backlog/Implementing/Done)','Dependencies'],
    format:'ADO/Jira Feature backlog, filtered and ordered by WSJF',
    tools:['Azure DevOps','Jira','Rally','Aha! Roadmap'],
    howToBuild:[
      {title:'Decompose epics into features',desc:'For each approved epic, identify the shippable increments of value. Each feature should be deliverable within one PI by one or two teams.'},
      {title:'Write benefit hypotheses',desc:'Each feature gets: "This feature will [enable X] for [user group], resulting in [measurable outcome]." No benefit hypothesis = no feature.'},
      {title:'Define acceptance criteria',desc:'Clear, testable conditions that must be true for the feature to be "done". Work with System Architect for NFRs.'},
      {title:'Score with WSJF and rank',desc:'Apply WSJF at the feature level. Rank-order the backlog. Top features are candidates for the next PI Planning.'},
      {title:'Groom continuously',desc:'Refine the top 2 PIs worth of features weekly. Features entering the next PI must have acceptance criteria, estimated size, and identified team(s).'}
    ]
  },
  {id:'product-roadmap', name:'Product Roadmap', owner:'Product Manager', stages:['3'],
    why:'Communicates the planned sequence of features over time, aligning stakeholders and managing expectations.',
    description:'A visual timeline showing planned feature delivery across the next 3-4 PIs (approximately 9-12 months). It maps features to PIs and shows the progression from current capabilities to future state. The roadmap is not a commitment — it is a forecast based on current priorities, capacity, and knowledge. It serves as a communication tool for stakeholders, a planning input for ARTs, and a dependency identification tool across value streams.',
    sections:['Current PI Features (committed)','Next PI Features (planned with high confidence)','PI+2 Features (planned with medium confidence)','PI+3+ Features (aspirational/low confidence)','Milestones & External Dependencies','Feature-to-Epic Traceability','Confidence Levels per Horizon'],
    format:'Timeline visualization (roadmap tool, PPT, or wall poster)',
    tools:['Aha! Roadmaps','ProductPlan','Azure DevOps delivery plans','PowerPoint','Mural/Miro'],
    howToBuild:[
      {title:'Start with the committed PI',desc:'Map all features the ART has committed to in the current PI. These are high confidence and should not change.'},
      {title:'Lay out the next PI',desc:'Based on Program Backlog priority and capacity forecasts, place features into the next PI. Mark confidence as "High" if groomed and sized, "Medium" if still being refined.'},
      {title:'Extend to PI+2 and beyond',desc:'Place remaining backlog features into future PIs based on rough estimates. Mark these as lower confidence. Include major enablers.'},
      {title:'Add milestones and dependencies',desc:'Overlay external milestones (regulatory deadlines, market events) and cross-ART dependencies. Flag conflicts.'},
      {title:'Communicate with confidence markers',desc:'Always present the roadmap with clear confidence bands. Near-term = committed. Mid-term = planned. Far-term = aspirational. Prevent roadmap from becoming a contract.'}
    ]
  },
  {id:'pi-objectives', name:'PI Objectives', owner:'Product Manager / Teams', stages:['3','5'],
    why:'Commitment and alignment device for the PI. Teams and management share a common understanding of what will be delivered.',
    description:'A set of SMART objectives created by each team during PI Planning that describe the intended outcomes of the upcoming PI. Objectives are split into committed (high confidence, team will deliver) and uncommitted (stretch goals, may deliver if things go well). Business value is assigned to each objective (1-10 scale) by the Product Manager/Business Owner, creating a shared understanding of what matters most. PI Objective achievement is the primary measure of ART predictability.',
    sections:['Team Name','Objective Description (outcome-oriented, not task-oriented)','Committed vs. Uncommitted flag','Business Value (1-10, assigned by Business Owner)','Planned Features/Stories Contributing to Objective','Dependencies on Other Teams','Risks to Achievement'],
    format:'PI Planning board (physical or digital), ADO PI tracking',
    tools:['Azure DevOps','Jira Align','PI Planning Wall (physical)','Mural/Miro (digital PI Planning)'],
    howToBuild:[
      {title:'Draft during PI Planning (Day 2)',desc:'Each team drafts 5-10 objectives based on the features they pulled into their plan. Write outcomes, not tasks: "Users can self-service password reset" not "Implement password reset API".'},
      {title:'Assign business value',desc:'Product Manager/Business Owner assigns a 1-10 business value to each objective. This forces prioritization conversations and alignment.'},
      {title:'Split committed vs. uncommitted',desc:'Committed objectives (80%+ confidence) vs. uncommitted (stretch/risk-dependent). Teams should commit to ~80% of capacity, leaving buffer.'},
      {title:'Identify risks and dependencies',desc:'For each objective, list what could prevent delivery and any dependencies on other teams. Feed these into the program board.'},
      {title:'Track weekly during PI execution',desc:'At each ART Sync, teams report on objective progress. At PI end, calculate predictability: actual business value delivered / planned business value.'}
    ]
  },
  {id:'team-backlog', name:'Team Backlog', owner:'Product Owner', stages:['3','4'],
    why:'Ensures the team always has a prioritized queue of ready work, preventing idle time and context switching.',
    description:'The single ordered list of all work items (user stories, enablers, defects, spikes) for a specific agile team. The Product Owner owns the "what" and "why" — prioritizing items based on value, risk, and dependencies. The team owns the "how" — estimating size and determining technical approach. A healthy Team Backlog has 2-3 iterations of refined stories at the top (ready to pull) and a longer tail of roughly estimated items below.',
    sections:['Story ID & Title','Story Type (User Story / Enabler / Defect / Spike)','Priority Rank','Story Points Estimate','Parent Feature','Acceptance Criteria','Definition of Ready Status','Sprint Assignment (if pulled)','Dependencies'],
    format:'ADO/Jira backlog board, ordered by priority',
    tools:['Azure DevOps','Jira','Rally','Shortcut'],
    howToBuild:[
      {title:'Decompose features into stories',desc:'Product Owner and team break each assigned feature into user stories. Each story should be independently deliverable within a single iteration.'},
      {title:'Write stories in standard format',desc:'Use: "As a [user role], I want [action], so that [benefit]." Add acceptance criteria using Given/When/Then format.'},
      {title:'Estimate and prioritize',desc:'Team estimates using story points (Fibonacci). PO prioritizes by business value, considering dependencies and risk. Highest-value stories at top.'},
      {title:'Apply Definition of Ready',desc:'Stories entering a sprint must have: clear acceptance criteria, estimated size, no unresolved dependencies, and UX/design available if needed.'},
      {title:'Refine continuously',desc:'Dedicate 10% of sprint capacity to backlog refinement. Keep 2-3 sprints of ready stories. Remove or re-prioritize stale items quarterly.'}
    ]
  },
  {id:'user-stories', name:'User Stories', owner:'Product Owner', stages:['4'],
    why:'Express requirements from the user\'s perspective, keeping development focused on value delivery rather than technical specifications.',
    description:'Short, simple descriptions of a desired outcome written from the perspective of the person who wants the capability. User stories follow the "As a / I want / So that" format and include acceptance criteria that define "done." They are deliberately small — deliverable within a single iteration — and serve as a placeholder for a conversation between PO and team, not as a complete specification. The story card captures the intent; the details emerge through collaboration.',
    sections:['Story Title','User Story Statement (As a [role], I want [capability], so that [benefit])','Acceptance Criteria (Given/When/Then scenarios)','Story Points Estimate','Parent Feature','UX/Design Reference (if applicable)','Technical Notes','Definition of Done Checklist'],
    format:'ADO Work Item (User Story type), index card, or Jira issue',
    tools:['Azure DevOps','Jira','Physical index cards','Rally'],
    howToBuild:[
      {title:'Identify the user and need',desc:'Start with who benefits and what they need. Be specific about the user role: "As a field sales rep" not "As a user."'},
      {title:'Write the story statement',desc:'Follow the template: "As a [specific user], I want [specific capability], so that [specific measurable benefit]." Keep it to one sentence.'},
      {title:'Define acceptance criteria',desc:'Write 3-7 Given/When/Then scenarios that cover the happy path, edge cases, and error scenarios. These become the basis for test cases.'},
      {title:'Apply INVEST criteria',desc:'Verify each story is: Independent, Negotiable, Valuable, Estimable, Small (fits in one sprint), Testable. Split stories that fail these criteria.'},
      {title:'Estimate collaboratively',desc:'Use planning poker or team estimation. Size in story points relative to a reference story. Stories > 8 points should be split.'},
      {title:'Attach supporting materials',desc:'Link wireframes, API specs, data models, or design mockups. These support the conversation, not replace it.'}
    ]
  },
  {id:'acceptance-criteria', name:'Acceptance Criteria', owner:'Product Owner', stages:['4','6'],
    why:'Define "done" for each story, eliminating ambiguity and preventing rework from miscommunication.',
    description:'A set of conditions that a user story must satisfy to be considered complete and acceptable. Written in Given/When/Then (Gherkin) format, they serve triple duty: they define scope for developers, form the basis of test cases for QA, and provide the acceptance checklist for the Product Owner. Good acceptance criteria are specific, testable, and independent — they leave no room for interpretation about what "done" means.',
    sections:['Given (precondition/context)','When (action/trigger)','Then (expected outcome)','Negative Scenarios (what should NOT happen)','Edge Cases','Performance Criteria (if applicable)','Accessibility Requirements (if applicable)'],
    format:'Embedded within User Story work items',
    tools:['Azure DevOps (Acceptance Criteria field)','Jira','Cucumber/SpecFlow for automated BDD'],
    howToBuild:[
      {title:'Start with the happy path',desc:'Write the primary success scenario: "Given I am a logged-in user, When I click Submit Order, Then my order is placed and I see a confirmation number."'},
      {title:'Add negative and edge cases',desc:'What happens when it fails? "Given I submit with an expired card, Then I see an error message and the order is not placed."'},
      {title:'Include boundary conditions',desc:'Min/max values, empty states, timeout scenarios, concurrent user scenarios. Think about what breaks.'},
      {title:'Add non-functional criteria',desc:'Performance: "Page loads within 2 seconds." Accessibility: "All form fields have labels." Security: "Passwords are hashed."'},
      {title:'Validate with the team',desc:'Review acceptance criteria with developers and QA during refinement. If they have questions, the criteria need more detail. If they say "obvious", the criteria might be too vague.'}
    ]
  },
  {id:'solution-design-doc', name:'Solution Design Document', owner:'System Architect', stages:['4'],
    why:'Documents architectural decisions and design patterns, ensuring consistent implementation and reducing integration risk.',
    description:'A technical design document created for complex features that span multiple teams or introduce significant architectural change. It captures the problem being solved, the design approach chosen (and alternatives considered), data models, API contracts, integration patterns, and non-functional requirements. It is NOT a specification for every story — only for features that require cross-team coordination or that establish new patterns others will follow.',
    sections:['Problem Statement & Context','Design Goals & Constraints','Solution Overview (architecture diagram)','Data Model Changes','API Contracts & Integration Points','Security Considerations','Performance & Scalability Design','Alternatives Considered (and why rejected)','Migration/Rollback Strategy','Open Questions & Decisions Needed'],
    format:'Confluence page, ADO Wiki, or Word document with architecture diagrams',
    tools:['Confluence','ADO Wiki','Lucidchart/Draw.io for diagrams','Swagger/OpenAPI for APIs','C4 Model for architecture views'],
    howToBuild:[
      {title:'Start with the problem, not the solution',desc:'Clearly state what business problem this design solves and the constraints (time, budget, technology). Context prevents over-engineering.'},
      {title:'Create the architecture overview',desc:'Draw a C4 Context and Container diagram showing how the new capability fits into the existing system landscape. Show all integration touchpoints.'},
      {title:'Define data models and APIs',desc:'Document new or changed data entities, relationships, and API contracts. Use OpenAPI spec for REST APIs. Include versioning strategy.'},
      {title:'Document alternatives considered',desc:'List 2-3 design alternatives and explain why each was accepted or rejected. This prevents future teams from re-debating settled decisions.'},
      {title:'Address cross-cutting concerns',desc:'Security (authentication, authorization, data encryption), performance (expected load, response time targets), and operability (monitoring, logging, alerting).'},
      {title:'Review with the team',desc:'Hold a design review session with the implementing teams and affected teams. Incorporate feedback. Get sign-off from System Architect.'}
    ]
  },
  {id:'architecture-runway', name:'Architecture Runway', owner:'System Architect', stages:['4'],
    why:'Pre-built infrastructure and patterns that allow teams to deliver business features without being blocked by technical prerequisites.',
    description:'The existing code, components, infrastructure, and technical knowledge that allow teams to implement near-term features without delay. It is like laying track ahead of the train — if the runway is sufficient, teams can build business features immediately. If it runs out, teams get blocked waiting for infrastructure, frameworks, or patterns that should have been built in advance. The runway is extended through enabler epics, enabler features, and enabler stories planned alongside business work.',
    sections:['Current Runway Inventory (what exists today)','Runway Gaps (what is needed but missing)','Enabler Epics & Features (planned runway extensions)','Technical Debt Items (runway degradation)','Architecture Guidelines & Standards (patterns teams should follow)','Target Architecture Vision (where the runway leads)'],
    format:'Living document + backlog items in ADO/Jira',
    tools:['Confluence/ADO Wiki for documentation','ADO/Jira for enabler backlog items','Architecture decision records (ADRs)'],
    howToBuild:[
      {title:'Assess current runway',desc:'Inventory existing infrastructure, frameworks, shared services, and patterns. Map which upcoming features can be built today vs. which are blocked.'},
      {title:'Identify runway gaps',desc:'For the next 2-3 PIs of planned features, identify what technical prerequisites are missing: new APIs, shared components, infrastructure, security patterns.'},
      {title:'Create enabler backlog items',desc:'Write enabler epics/features/stories for each gap. Treat them like business items — they need value statements, size estimates, and prioritization.'},
      {title:'Allocate capacity',desc:'Reserve 20-30% of ART capacity for enablers and runway extension. Protect this allocation in guardrails — it is an investment, not waste.'},
      {title:'Maintain architecture decision records',desc:'For every significant architectural decision, write an ADR: context, decision, consequences. This prevents future teams from overturning good decisions without understanding why they were made.'}
    ]
  },
  {id:'working-code', name:'Working Code', owner:'Developer', stages:['4'],
    why:'The primary output of development — tested, reviewed code that implements user stories and delivers value.',
    description:'Production-quality source code that implements user stories, passes all automated tests, has been peer-reviewed, and is integrated into the main branch via CI/CD pipeline. Working code is the ultimate measure of progress in SAFe — not documents, not plans, not meetings. Each iteration produces a potentially shippable increment of working software. Code follows the team\'s coding standards, architecture guidelines, and includes appropriate unit tests and documentation.',
    sections:['Source Code (in feature branch → merged to main)','Unit Tests (co-located with code)','Code Review Comments & Approval','Build Pipeline Configuration','Technical Documentation (inline + README)','Deployment Manifest'],
    format:'Git repository with CI/CD pipeline',
    tools:['Git (Azure Repos, GitHub, Bitbucket)','CI/CD (Azure Pipelines, Jenkins, GitHub Actions)','SonarQube for code quality','IDE (VS Code, IntelliJ)'],
    howToBuild:[
      {title:'Branch from main',desc:'Create a feature branch for each story or small group of related stories. Keep branches short-lived (< 3 days ideally).'},
      {title:'Implement with tests',desc:'Write code that implements the story acceptance criteria. Write unit tests alongside production code (TDD encouraged). Maintain minimum coverage thresholds.'},
      {title:'Run local quality checks',desc:'Before pushing: run unit tests, linting, code formatting, and static analysis. Fix all issues locally.'},
      {title:'Create pull request for review',desc:'Submit a PR with a clear description of what changed and why. Request review from at least one peer. Address all review comments.'},
      {title:'Merge and validate',desc:'After approval, merge to main. CI pipeline runs full test suite, builds, and deploys to integration environment. Verify no regressions.'},
      {title:'Update work items',desc:'Move the ADO story to "Done." Link the PR/commit to the work item for traceability. Update any technical documentation.'}
    ]
  },
  {id:'unit-tests', name:'Unit Tests', owner:'Developer', stages:['4','6'],
    why:'Automated safety net that catches regressions early, reducing defect cost and enabling confident refactoring.',
    description:'Automated tests that verify individual units of code (functions, methods, classes) work correctly in isolation. They run in milliseconds, execute as part of every build, and catch regressions before code reaches QA. Good unit tests follow the AAA pattern (Arrange, Act, Assert), test one behavior per test, and use mocks/stubs for external dependencies. They are the foundation of the test pyramid — the most numerous, fastest, and cheapest tests to maintain.',
    sections:['Test Class/File (mirrors production code structure)','Test Methods (one per behavior)','Setup/Teardown (shared test fixtures)','Mocks & Stubs (for external dependencies)','Code Coverage Report','Test Naming Convention (should describe the behavior being tested)'],
    format:'Code files in the test directory of the repository',
    tools:['xUnit/NUnit/MSTest (.NET)','JUnit/TestNG (Java)','Jest/Mocha (JavaScript)','pytest (Python)','SonarQube for coverage tracking'],
    howToBuild:[
      {title:'Follow the test pyramid',desc:'Write many unit tests (fast, isolated), fewer integration tests (slower, real dependencies), and minimal E2E tests (slowest, full stack).'},
      {title:'Use AAA pattern',desc:'Arrange (set up test data and dependencies), Act (call the method under test), Assert (verify the expected outcome). One assert per test ideally.'},
      {title:'Name tests descriptively',desc:'Use: "Should_ReturnError_When_EmailIsInvalid" not "Test1." The test name should describe the expected behavior.'},
      {title:'Mock external dependencies',desc:'Use mocking frameworks to isolate the unit under test from databases, APIs, and file systems. Tests must run without infrastructure.'},
      {title:'Set coverage thresholds',desc:'Enforce minimum coverage (70-80%) in CI pipeline. Track coverage trends. Focus on critical path coverage, not 100% line coverage.'},
      {title:'Run in CI pipeline',desc:'Unit tests run on every commit/PR. Build fails if any test fails or coverage drops below threshold. No exceptions.'}
    ]
  },
  {id:'ado-work-items', name:'ADO Work Items', owner:'RTE / Teams', stages:['5'],
    why:'Azure DevOps is the system of record for all work, enabling tracking, metrics, and transparency across the ART.',
    description:'Structured records in Azure DevOps that represent every piece of work across the ART hierarchy: Epics → Features → User Stories → Tasks → Bugs. Each work item has a defined workflow (New → Active → Resolved → Closed), assigned owner, parent-child relationships, and metadata (story points, iteration, area path). ADO work items are the foundation of all metrics, reporting, and traceability — from portfolio KPIs down to individual developer tasks.',
    sections:['Work Item Types (Epic, Feature, User Story, Task, Bug, Test Case)','Workflow States per Type','Field Standards (required fields per type)','Area Paths (team/component mapping)','Iteration Paths (sprint/PI mapping)','Parent-Child Linking Rules','Tagging Convention'],
    format:'Azure DevOps Boards, Backlogs, and Queries',
    tools:['Azure DevOps','Power BI (for ADO analytics)','ADO REST API (for custom integrations)'],
    howToBuild:[
      {title:'Configure the process template',desc:'Set up the ADO process (Agile, Scrum, or custom) with the right work item types and workflow states. Customize fields per type.'},
      {title:'Define area paths by team',desc:'Create area paths that map to ART teams. Each team owns its area path. Features can span areas; stories belong to one team.'},
      {title:'Set iteration paths by PI and Sprint',desc:'Create iterations for each PI and sprint within. E.g., PI-2026.1 → Sprint 1, Sprint 2, ... Sprint 5, IP Sprint.'},
      {title:'Establish linking standards',desc:'Every Story links to a parent Feature. Every Feature links to a parent Epic. Every Bug links to the Story it affects. Enforce in reviews.'},
      {title:'Create standard queries and dashboards',desc:'Build shared queries: "My team\'s current sprint", "Open bugs by priority", "Feature completion by PI". Create dashboards for ART Sync.'},
      {title:'Train all team members',desc:'Everyone on the ART must know how to create, update, and transition work items. Board hygiene is everyone\'s job.'}
    ]
  },
  {id:'art-metrics', name:'ART Metrics Dashboard', owner:'RTE', stages:['5'],
    why:'Visualizes flow, quality, and predictability — enabling data-driven improvement at the ART level.',
    description:'A comprehensive dashboard that tracks the ART\'s health using SAFe flow metrics and quality indicators. It answers: Are we delivering fast enough? Are we predictable? Are we building quality in? Are we improving? The dashboard is reviewed at every ART Sync and is the primary tool for the RTE to identify systemic issues. It combines flow metrics (throughput, cycle time, WIP, flow efficiency) with quality metrics (defect trends, escaped defects) and predictability (PI objective achievement).',
    sections:['Flow Metrics (Throughput, Cycle Time, WIP, Flow Distribution, Flow Efficiency, Flow Load)','Quality Metrics (Defect Trend, Escaped Defects, Technical Debt Trend)','Predictability (PI Objective Achievement %, Planned vs. Actual Velocity)','Team-Level Health (per-team velocity, burndown, satisfaction)','Dependency Tracking (resolved vs. open cross-team dependencies)','Improvement Trends (metrics over multiple PIs)'],
    format:'Power BI dashboard connected to ADO, updated automatically',
    tools:['Power BI','Azure DevOps Analytics Views','ADO REST API','Tableau','Custom Python/R scripts for advanced analysis'],
    howToBuild:[
      {title:'Define the metrics catalog',desc:'Choose 6-10 metrics that matter most. Start with SAFe\'s six flow metrics: Distribution, Velocity, Time, Load, Efficiency, Predictability.'},
      {title:'Connect to ADO data',desc:'Use ADO Analytics Views or OData endpoints to pull work item data into Power BI. Set up incremental refresh for performance.'},
      {title:'Build flow metric visualizations',desc:'Create charts: Cumulative Flow Diagram (WIP over time), Cycle Time Scatter Plot, Throughput Run Chart, Flow Efficiency calculation.'},
      {title:'Add quality and predictability layers',desc:'Overlay defect trends, escaped defects to production, and PI objective achievement rates. Show trends across PIs, not just snapshots.'},
      {title:'Create team-level drill-downs',desc:'Allow clicking from ART-level metrics into individual team metrics. Enable RTEs and SMs to identify which teams need coaching.'},
      {title:'Automate and publish',desc:'Schedule daily refresh. Publish to a shared workspace. Review at ART Sync weekly and in depth at PI retrospectives.'}
    ]
  },
  {id:'impediment-log', name:'Impediment Log', owner:'Scrum Master', stages:['5'],
    why:'Makes blockers visible and trackable, ensuring they get resolved rather than silently slowing the team.',
    description:'A structured register of all obstacles preventing the team from delivering at full velocity. Each impediment is logged with a description, impact assessment, owner, escalation status, and target resolution date. The log distinguishes between team-level impediments (SM can resolve) and ART/portfolio-level impediments (require RTE or leadership intervention). It is reviewed daily at standup and weekly at ART Sync, ensuring nothing stays stuck.',
    sections:['Impediment ID','Description & Impact','Affected Team(s) and Stories','Severity (Critical/High/Medium/Low)','Owner (who is working on resolution)','Escalation Level (Team/ART/Portfolio)','Status (Open/In Progress/Escalated/Resolved)','Date Raised','Target Resolution Date','Actual Resolution Date','Resolution Notes'],
    format:'Shared list (ADO Queries, Excel, Confluence table)',
    tools:['Azure DevOps (Bug/Issue type)','Excel/Sheets','Confluence','Trello/Kanban board'],
    howToBuild:[
      {title:'Create the tracking mechanism',desc:'Set up a shared list accessible to all team members. Can be as simple as a shared spreadsheet or as structured as ADO work items with a custom "Impediment" type.'},
      {title:'Define severity levels',desc:'Critical = blocking multiple stories/teams right now. High = will block within this sprint. Medium = slowing but workaround exists. Low = annoyance, not blocking.'},
      {title:'Establish escalation paths',desc:'Team-level: SM resolves within 2 days. ART-level: RTE escalation, resolves within 1 week. Portfolio-level: LPM/management escalation for org/budget issues.'},
      {title:'Review daily and weekly',desc:'Standup: review all open Critical/High impediments. ART Sync: review escalated impediments. PI Retrospective: analyze patterns and systemic issues.'},
      {title:'Track resolution metrics',desc:'Measure: average time to resolve by severity, escalation rate, repeat impediment rate. Use data to drive systemic improvements.'}
    ]
  },
  {id:'test-plan', name:'Test Plan', owner:'Tester/QA', stages:['6'],
    why:'Structured approach to testing that ensures adequate coverage and risk-based prioritization of testing efforts.',
    description:'A document that defines the scope, approach, resources, schedule, and deliverables for testing a feature or release. It answers: What will we test? How deep? What environments? Who does what? What are the entry/exit criteria? The test plan is risk-based — critical functionality gets deeper testing, low-risk changes get lighter coverage. It prevents both under-testing (escaping defects) and over-testing (wasting time on low-risk areas).',
    sections:['Test Scope (in-scope and out-of-scope features)','Test Strategy (risk-based approach, test levels)','Test Types (functional, integration, regression, performance, security, accessibility)','Test Environment Requirements','Test Data Requirements','Entry Criteria (when testing can start)','Exit Criteria (when testing is considered complete)','Resource Allocation','Schedule & Milestones','Risk Assessment & Mitigation','Defect Management Process'],
    format:'Confluence page, ADO Wiki, or Word document',
    tools:['Azure Test Plans','TestRail','Zephyr','Confluence','qTest'],
    howToBuild:[
      {title:'Assess risk per feature',desc:'Rate each feature on likelihood of defects (complexity, newness, team experience) × business impact. High risk = deep testing. Low risk = smoke testing.'},
      {title:'Define test levels',desc:'Unit (developer), System (QA), Integration (cross-system), UAT (business), Performance (load/stress), Security (penetration). Map which levels apply to each feature.'},
      {title:'Specify environments and data',desc:'Document which test environments are needed, how they are provisioned, and what test data is required. Include data masking requirements for production-like data.'},
      {title:'Set entry and exit criteria',desc:'Entry: "Build deployed to test environment, unit tests passing, no critical defects from previous cycle." Exit: "All critical/high test cases passed, no open Critical defects."'},
      {title:'Estimate effort and schedule',desc:'Based on scope and risk, estimate test case creation and execution effort. Map to sprint/PI calendar. Identify parallel execution opportunities.'},
      {title:'Get stakeholder agreement',desc:'Review the test plan with PM, PO, and RTE. Ensure everyone agrees on scope, risk priorities, and exit criteria before testing begins.'}
    ]
  },
  {id:'test-cases', name:'Test Cases', owner:'Tester/QA', stages:['6'],
    why:'Reusable, traceable test specifications that verify acceptance criteria are met and quality standards maintained.',
    description:'Detailed step-by-step instructions for verifying that a specific requirement or behavior works correctly. Each test case has preconditions, test steps, expected results, and actual results. They are linked to user stories and acceptance criteria for full traceability. Test cases are reusable — once written, they become part of the regression suite, ensuring that future changes don\'t break existing functionality.',
    sections:['Test Case ID','Title (descriptive of what is being tested)','Preconditions','Test Steps (numbered, specific actions)','Expected Results (per step)','Actual Results (filled during execution)','Test Data Requirements','Pass/Fail Status','Priority (must-run vs. nice-to-have)','Linked User Story/Feature','Automation Status (manual/automated/candidate)'],
    format:'Azure Test Plans, TestRail, or structured spreadsheet',
    tools:['Azure Test Plans','TestRail','Zephyr','Excel (for simple projects)','Selenium/Playwright (for automation)'],
    howToBuild:[
      {title:'Derive from acceptance criteria',desc:'Each Given/When/Then scenario becomes at least one test case. Add test cases for negative scenarios, boundaries, and error handling not explicitly in AC.'},
      {title:'Write atomic, independent steps',desc:'Each test case should test one scenario. Steps should be detailed enough for any tester to execute: "Click the Submit button" not "Submit the form."'},
      {title:'Include test data specifications',desc:'Define exact test data needed: user credentials, product SKUs, date ranges. Maintain a test data catalog for reuse.'},
      {title:'Prioritize for regression',desc:'Tag each test case: P1 (must-run every release), P2 (run for related changes), P3 (run periodically). P1 cases are automation candidates.'},
      {title:'Link to stories and features',desc:'Every test case links to the story/feature it verifies. This enables impact analysis: "If Story X changes, which test cases need re-execution?"'},
      {title:'Identify automation candidates',desc:'Stable, frequently-run, data-driven test cases should be automated. Tag candidates and feed into the automation backlog.'}
    ]
  },
  {id:'defect-reports', name:'Defect Reports', owner:'Tester/QA', stages:['6'],
    why:'Structured defect documentation that enables efficient triage, prioritization, and resolution tracking.',
    description:'Formal records of software defects found during testing or production use. Each report provides enough detail for a developer to understand, reproduce, and fix the issue without further questions. Good defect reports dramatically reduce resolution time by eliminating back-and-forth. They are tracked through a workflow (New → Triaged → In Progress → Resolved → Verified → Closed) and feed into quality metrics for trend analysis.',
    sections:['Defect ID','Title (concise description of the problem)','Severity (Critical/High/Medium/Low)','Priority (must-fix-now vs. can-wait)','Environment (where found)','Steps to Reproduce (numbered, specific)','Expected Behavior','Actual Behavior','Screenshots/Videos','Linked Test Case & User Story','Assigned Developer','Resolution Notes'],
    format:'ADO Bug work items or Jira Bug issues',
    tools:['Azure DevOps (Bug type)','Jira','Bugzilla','Screenshot tools (Loom, Snagit)'],
    howToBuild:[
      {title:'Write a clear title',desc:'Summarize the defect in one line: "Login fails with valid credentials when special characters in password" — not "Login broken."'},
      {title:'Classify severity and priority',desc:'Severity = technical impact (Critical: system down, High: major function broken, Medium: workaround exists, Low: cosmetic). Priority = business urgency.'},
      {title:'Provide exact reproduction steps',desc:'Numbered steps from a clean state to the bug. Include: browser/OS, test data used, exact clicks/inputs. A developer should reproduce in < 5 minutes.'},
      {title:'Attach evidence',desc:'Screenshots of the error, console logs, network traces, video recording. Visual evidence removes ambiguity and accelerates diagnosis.'},
      {title:'Link to context',desc:'Link to the test case that found it, the user story it affects, and the build/release version. This enables impact analysis and regression prevention.'},
      {title:'Track through resolution',desc:'Triage daily. Assign to developer. Developer resolves and moves to Verified. QA re-tests and closes or reopens. Track time-to-resolve by severity.'}
    ]
  },
  {id:'uat-scripts', name:'UAT Scripts', owner:'Tester/QA', stages:['6','8'],
    why:'Business-readable test scripts that enable stakeholders to validate the solution meets real-world needs.',
    description:'Simplified, business-language test scripts designed for non-technical users to execute during User Acceptance Testing. Unlike detailed test cases written for QA engineers, UAT scripts use plain language, reference realistic business scenarios, and include visual guides (screenshots). They validate that the solution works in the context of real business processes — not just that individual features function correctly. UAT sign-off is a key quality gate before release.',
    sections:['Scenario Name (business-meaningful)','Business Context (why this scenario matters)','Preconditions (what must be true before starting)','Steps (plain language, with screenshots)','Expected Outcome (what the user should see)','Pass/Fail/Comments Column','Tester Name & Date','Sign-off Section'],
    format:'Excel workbook with scenario tabs, or structured Confluence page',
    tools:['Excel/Google Sheets','Confluence','Azure Test Plans (simplified view)','UserSnap for guided testing'],
    howToBuild:[
      {title:'Identify critical business scenarios',desc:'Work with Product Owner and business SMEs to identify the 10-20 most important end-to-end business scenarios. Focus on workflows, not individual screens.'},
      {title:'Write in plain business language',desc:'"Create a new customer order with 3 line items and apply the 10% discount" — not "Navigate to /orders/new and POST the JSON payload."'},
      {title:'Add screenshots and visual guides',desc:'Include annotated screenshots showing where to click, what to type, and what to expect. Business users need visual anchors.'},
      {title:'Include realistic test data',desc:'Provide the exact data users should enter or reference. Pre-load test data in the UAT environment if possible.'},
      {title:'Create a sign-off template',desc:'Each scenario has a Pass/Fail column, a Comments field, and a Sign-off row with name/date. All critical scenarios must pass for UAT sign-off.'},
      {title:'Brief the UAT participants',desc:'Hold a 30-minute session explaining the scripts, environment access, and defect reporting process. Don\'t just send scripts by email.'}
    ]
  },
  {id:'release-plan', name:'Release Plan', owner:'Release Manager', stages:['7'],
    why:'Coordinates what, when, and how code moves to production, reducing deployment risk and enabling predictability.',
    description:'A comprehensive plan that orchestrates the release of new capabilities to production. It covers scope (which features/stories), timing (deployment windows), sequence (what deploys in what order), environment progression (dev → staging → production), stakeholder communication, and risk mitigation. For multi-ART or multi-region releases, it also coordinates cross-team deployment dependencies and staggered rollouts.',
    sections:['Release Scope (features, stories, bug fixes included)','Release Schedule (deployment windows, blackout periods)','Environment Progression (dev → QA → staging → production)','Deployment Sequence & Dependencies','Pre-Release Checklist','Post-Release Verification','Communication Plan (who to notify, when)','Risk Assessment & Mitigation','Rollback Triggers & Plan','Success Criteria'],
    format:'Confluence page or Word document with linked deployment checklist',
    tools:['Confluence','ADO Release Pipelines','Octopus Deploy','Azure DevOps','ServiceNow (change management)'],
    howToBuild:[
      {title:'Define scope with RTE and PM',desc:'Lock release scope 1-2 sprints before deployment. List every feature, story, and bug fix by ADO ID. No last-minute additions without release manager approval.'},
      {title:'Map the deployment sequence',desc:'Identify what deploys first (database changes), second (backend services), third (frontend). Map cross-service dependencies.'},
      {title:'Schedule deployment windows',desc:'Coordinate with ops for deployment windows. Avoid peak business hours. Account for timezone differences in global releases.'},
      {title:'Create pre/post checklists',desc:'Pre: all tests passed, rollback tested, stakeholders notified, on-call team staffed. Post: smoke tests passed, monitoring normal, users can access.'},
      {title:'Define rollback criteria',desc:'Clear triggers for rollback: "If error rate exceeds 5% within 30 minutes of deployment, execute rollback plan." No ambiguity.'},
      {title:'Communicate the plan',desc:'Share with all stakeholders 1 week before release. Include: what changes, who is affected, expected downtime, and support contact.'}
    ]
  },
  {id:'deployment-checklist', name:'Deployment Checklist', owner:'Release Manager', stages:['7'],
    why:'Step-by-step verification that all prerequisites are met before deployment, preventing failed releases.',
    description:'A detailed, ordered checklist executed during each deployment to ensure every prerequisite is met, every step is performed correctly, and every verification is completed. It transforms deployment from a risky ad-hoc activity into a repeatable, auditable process. The checklist includes pre-deployment checks (quality gates, approvals, environment readiness), deployment steps (exact commands or pipeline triggers), and post-deployment verification (smoke tests, monitoring checks).',
    sections:['Pre-Deployment Checks (quality sign-off, change approval, env readiness, backups)','Deployment Steps (ordered technical steps)','Post-Deployment Verification (smoke tests, monitoring, user access)','Rollback Steps (if verification fails)','Communication Steps (status updates at each phase)','Sign-off Section (deployer, verifier, release manager)'],
    format:'Shared checklist (Confluence, ADO, Excel with checkbox column)',
    tools:['Azure DevOps Release Pipelines','Confluence','Excel','ServiceNow (change records)','PagerDuty (on-call)'],
    howToBuild:[
      {title:'Document every deployment step',desc:'Walk through a deployment end-to-end. Write down every command, click, and verification. Include the exact sequence and expected duration per step.'},
      {title:'Add pre-conditions',desc:'Before deployment starts: QA sign-off received? Change approval granted? Database backup completed? On-call engineer available? Monitor dashboard open?'},
      {title:'Include verification steps',desc:'After each major deployment step, add a verification: "Verify API health endpoint returns 200." "Verify login page loads." "Verify no error spike in logs."'},
      {title:'Add rollback decision points',desc:'After post-deployment verification, include: "If any critical verification fails, proceed to Rollback Steps section." Rollback steps are equally detailed.'},
      {title:'Build in communication milestones',desc:'At each phase: "Notify #releases Slack channel: Deployment started / Database migration complete / Frontend deployed / Verification complete / Release done."'},
      {title:'Iterate after every release',desc:'After each deployment, update the checklist based on what was missed, what took longer, or what new step was needed. The checklist is a living document.'}
    ]
  },
  {id:'release-notes', name:'Release Notes', owner:'Release Manager', stages:['7'],
    why:'Communicates what changed to support teams and users, enabling effective troubleshooting and adoption.',
    description:'A structured document published with every release that describes what changed, what\'s new, what\'s fixed, and what\'s known. It serves three audiences: support teams (for troubleshooting), end users (for adoption), and operations (for monitoring). Good release notes are concise, organized by impact, and written in language appropriate to the audience — technical details for ops, business language for users.',
    sections:['Release Version & Date','New Features (with brief description and user impact)','Improvements (enhancements to existing features)','Bug Fixes (with original defect reference)','Known Issues (unresolved issues with workarounds)','Breaking Changes (anything requiring user action)','Technical Notes (for ops/support teams)','Rollout Schedule (if phased)'],
    format:'Confluence page, email, or in-app notification',
    tools:['Confluence','ADO Wiki','Email/Slack for distribution','In-app changelog tools'],
    howToBuild:[
      {title:'Compile changes from ADO',desc:'Query all features, stories, and bugs included in the release. Group by: New Features, Improvements, Bug Fixes.'},
      {title:'Write user-facing descriptions',desc:'Translate each change into user language: "You can now export reports as PDF" not "Implemented PDF export endpoint in ReportService."'},
      {title:'Document known issues',desc:'List any open defects or limitations shipping with this release. Include workarounds and expected fix timeline.'},
      {title:'Flag breaking changes',desc:'Anything requiring user action (new login process, deprecated API, changed workflow) gets highlighted prominently.'},
      {title:'Distribute to all audiences',desc:'Publish to Confluence/Wiki for internal teams. Email summary to stakeholders. Post to support channels. Include in change manager\'s comms pack.'}
    ]
  },
  {id:'ktlo-log', name:'KTLO Log', owner:'Release Manager', stages:['7'],
    why:'Tracks keep-the-lights-on activities (patches, hotfixes) separately from feature releases for accurate capacity planning.',
    description:'A dedicated tracking register for all maintenance and operational releases that happen outside the normal PI feature delivery cycle. This includes security patches, hotfixes for production incidents, minor configuration changes, and infrastructure updates. Tracking KTLO separately is critical because it reveals how much team capacity is consumed by operational work versus new feature development — a key input to capacity planning and technical debt investment decisions.',
    sections:['KTLO Item ID','Type (Hotfix/Patch/Config Change/Infrastructure)','Description','Urgency (Emergency/Planned)','Requesting Party','Impact Assessment','Deployment Date','Time Spent (hours)','Linked Incident/Ticket','Post-Deployment Status'],
    format:'Spreadsheet or ADO backlog with KTLO tag',
    tools:['Azure DevOps (tagged work items)','ServiceNow','Excel/Sheets','PagerDuty (incident link)'],
    howToBuild:[
      {title:'Define what counts as KTLO',desc:'Establish clear criteria: unplanned production fixes, security patches, infrastructure maintenance, data fixes. Exclude planned features and enablers.'},
      {title:'Create a tracking tag in ADO',desc:'Tag all KTLO work items with "KTLO" in ADO. This enables filtering and reporting. Create a dedicated KTLO board view.'},
      {title:'Log time spent',desc:'Track actual hours spent on each KTLO item. This is essential for calculating the true cost of operational maintenance.'},
      {title:'Report KTLO vs. feature ratio',desc:'Calculate monthly: % of team capacity spent on KTLO vs. feature delivery. Target: < 20% KTLO. If higher, invest in tech debt reduction.'},
      {title:'Feed into capacity planning',desc:'Use KTLO trends to reserve appropriate capacity in future PIs. If KTLO is trending up, it signals need for infrastructure investment.'}
    ]
  },
  {id:'rollback-plan', name:'Rollback Plan', owner:'Release Manager', stages:['7'],
    why:'Pre-planned recovery procedure that minimizes downtime if a deployment fails. Essential risk mitigation.',
    description:'A detailed, pre-tested recovery procedure that returns the system to its pre-deployment state if a release fails. Every production deployment must have a rollback plan before it starts. The plan covers database rollback (schema reversions, data restoration), application rollback (redeploying previous version), infrastructure rollback (reverting configuration changes), and communication (notifying stakeholders of the rollback). The plan must be tested in staging before being relied upon in production.',
    sections:['Rollback Decision Criteria (what triggers a rollback)','Database Rollback Steps (schema revert, data restore)','Application Rollback Steps (re-deploy previous version)','Infrastructure Rollback Steps (config/DNS/load balancer revert)','Verification Steps (confirm rollback was successful)','Communication Template (stakeholder notification)','Estimated Rollback Duration','Roles & Responsibilities During Rollback'],
    format:'Appendix to Release Plan or standalone document',
    tools:['Azure DevOps Release Pipelines','Database migration tools (Flyway, Liquibase)','Infrastructure as Code (Terraform, ARM)','Confluence'],
    howToBuild:[
      {title:'Define rollback triggers',desc:'Clear, measurable criteria: "Error rate > 5% for 15 minutes", "Critical business flow broken", "Data corruption detected." Remove human judgment from the trigger.'},
      {title:'Document database rollback',desc:'Script the exact database changes needed to revert. If using migration tools (Flyway), ensure down-migrations exist and are tested. If data was modified, plan restoration.'},
      {title:'Document application rollback',desc:'Identify the previous stable version. Script the redeployment: which artifacts, which pipeline, which configuration. Test in staging.'},
      {title:'Plan infrastructure rollback',desc:'If DNS, load balancer, or configuration changes were made, script the reversal. Use infrastructure-as-code to ensure repeatability.'},
      {title:'Test the rollback plan',desc:'Execute the full rollback in a staging environment before production deployment. Measure the rollback duration. Fix any gaps.'},
      {title:'Assign roles',desc:'Who makes the rollback decision? Who executes each step? Who communicates to stakeholders? Document names and contact details.'}
    ]
  },
  {id:'csa-document', name:'CSA Document', owner:'Rollout Lead', stages:['8'],
    why:'Country Scope Assessment ensures each market\'s specific needs, regulations, and constraints are addressed before rollout.',
    description:'A market-specific assessment document that evaluates the readiness and requirements for rolling out a solution to a particular country or region. It captures local regulatory requirements, language/localization needs, data residency constraints, existing systems to integrate with, local business process variations, and stakeholder contacts. The CSA prevents "one size fits all" rollouts by ensuring each market\'s unique context is understood and addressed before go-live.',
    sections:['Country/Region Profile','Regulatory & Compliance Requirements','Language & Localization Needs','Data Residency & Privacy Requirements','Local System Integrations','Business Process Variations','Stakeholder Map (local sponsors, IT contacts, business leads)','Infrastructure Requirements','Training & Change Needs Assessment','Risk Assessment','Readiness Score (Red/Amber/Green per category)'],
    format:'Standardized template (Word/Confluence) completed per market',
    tools:['Confluence','Word/Google Docs','Excel for readiness scoring','SharePoint for document management'],
    howToBuild:[
      {title:'Create the CSA template',desc:'Build a standardized template covering all assessment categories. Use a consistent scoring system (R/A/G) for readiness per category.'},
